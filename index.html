<title>가위 바위 보 배틀 — S-R-P Battle v1.0</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  
:root {
  --bg:          #090b12;
  --bg2:         #0f1220;
  --panel:       #141726;
  --border:      #252840;
  --accent:      #e8c84a;
  --accent2:     #4af0c8;
  --danger:      #f04a6a;
  --muted:       #3a4060;
  --text:        #dde3f5;
  --text-dim:    #6a75a0;
  --scissors:    #6090f0;
  --rock:        #6090f0;
  --paper:       #6090f0;
  --silver:      #b8d0f0;
  --gold:        #ffd060;
  --normal-c:    #8898b8;
  --win:         #4af0c8;
  --lose:        #f04a6a;
  --draw:        #e8c84a;
  --enemy:       #ff6b8a;
  --shield:      #60c8ff;
  --glow-shield: rgba(96,200,255,.3);
  --glow-gold:   rgba(255,208,96,.4);
  --glow-silver: rgba(184,208,240,.28);
  --font-main: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
}

/* 실드 표시 */
.card-shield {
  font-family:'Rajdhani', sans-serif; font-size:.85rem; font-weight:700;
  color: var(--shield); position:absolute; bottom:5px; left:6px; letter-spacing:.5px;
}
.pip-shield {
  font-family:'Rajdhani', sans-serif; font-size:.72rem; font-weight:700;
  color: var(--shield); position:absolute; bottom:4px; left:4px; letter-spacing:.5px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.01) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.01) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}

#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px;
  padding: 0 10px 50px;
  display: flex; flex-direction: column; gap: 11px;
}

/* ═══ TITLE BAR ═══ */
#title-bar { text-align: center; padding: 12px 0 2px; }
.title-main, .hero-ko, .boss-dialogue, .opt-name, .rest-title {
  font-family: var(--font-main) !important;
  font-weight: 800;
  letter-spacing: -0.5px;
} /* ← 이 중괄호가 꼭 있어야 합니다! */
.title-sub {
  font-family: 'Orbitron', sans-serif;
  font-size: .7rem; font-weight: 700; letter-spacing: 6px;
  color: var(--accent2);
  text-shadow: 0 0 12px rgba(74,240,200,.4);
  margin-top: 1px;
}
.title-ver { font-family:'Orbitron',sans-serif; font-size:.5rem; letter-spacing:4px; color:var(--muted); }
#stage-label { font-size:1.1rem; font-weight:800; letter-spacing:4px; color:#ffffff; margin-top:4px; text-shadow: 0 0 12px rgba(255,255,255,.3); }

.personality-badge {
  display:inline-block; margin-top:5px;
  font-size:.6rem; letter-spacing:2px;
  border-radius:20px; padding:2px 10px; border:1px solid;
}
.pb-aggressive { border-color:var(--danger);  color:var(--danger);  background:rgba(240,74,106,.1); }
.pb-counter    { border-color:var(--enemy);   color:var(--enemy);   background:rgba(255,107,138,.08); }
.pb-careful    { border-color:var(--accent2); color:var(--accent2); background:rgba(74,240,200,.08); }
.pb-master-aggressive { border-color:#ff9050; color:#ff9050; background:rgba(255,144,80,.1); }
.pb-master-counter    { border-color:#b070ff; color:#b070ff; background:rgba(176,112,255,.1); }
.pb-master-careful    { border-color:#5fd8e8; color:#5fd8e8; background:rgba(95,216,232,.1); }
.pb-chaotic           { border-color:#ffd060; color:#ffd060; background:rgba(255,208,96,.1); }
.pb-analyst           { border-color:#60c8ff; color:#60c8ff; background:rgba(96,200,255,.1); }

/* ═══ CHARACTER SELECT (대격변 v6.0) ═══ */
.char-grid { display:grid; grid-template-columns:1fr; gap:10px; }
.char-card {
  background:var(--bg2); border:2px solid var(--border);
  border-radius:10px; padding:12px 14px;
  cursor:pointer; transition:all .2s;
}
.char-card:hover { transform:translateY(-2px); border-color:var(--accent2); }
.char-card.selected {
  border-color:var(--accent); background:rgba(232,200,74,.06);
  box-shadow:0 0 14px rgba(232,200,74,.18);
}
.char-head { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.char-icon { font-size:1.4rem; }
.char-name { font-weight:800; font-size:1rem; color:var(--text); letter-spacing:-.3px; }
.char-summary { font-size:.72rem; color:var(--text-dim); margin-bottom:9px; line-height:1.5; }
/* 111번 라인 부근 */
.char-deck { 
  display: grid; 
  grid-template-columns: repeat(6, 1fr); /* 6열 고정 */
  gap: 4px; 
}
.char-pip { 
  width: 100%; /* 부모 그리드 너비에 맞춤 */
  max-width: 42px; 
  height: 54px; 
}
.char-pip .pip-dmg { font-size:.72rem; bottom:3px; right:4px; }
.char-pip .pip-shield { font-size:.6rem; bottom:3px; left:3px; }

/* ⚡ 사이버펑크 화면 글리치(깨짐) 트랜지션 */
@keyframes glitch-anim {
  0% { filter: contrast(1) hue-rotate(0deg); transform: translate(0) scale(1); opacity: 1; }
  20% { filter: contrast(2) hue-rotate(90deg); transform: translate(-10px, 5px) scale(1.02); opacity: 0.8; }
  40% { filter: contrast(1.5) hue-rotate(-90deg); transform: translate(10px, -5px) scale(0.98); opacity: 0.9; }
  60% { filter: contrast(2.5) hue-rotate(180deg); transform: translate(-5px, 10px) scale(1.05); opacity: 0.5; }
  80% { filter: contrast(1.5) hue-rotate(-180deg); transform: translate(5px, -10px) scale(0.95); opacity: 0.8; }
  100% { filter: contrast(1) hue-rotate(0deg); transform: translate(0) scale(1); opacity: 1; }
}
.glitch-transition { animation: glitch-anim 0.4s cubic-bezier(.25, .46, .45, .94) both; }

/* 📖 엔딩 시네마틱 텍스트 */
.ending-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  text-align: center;
  font-family: var(--font-main);
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--text);
  line-height: 2.2;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity 2s ease-in-out; /* 서서히 페이드 인/아웃 */
  pointer-events: none;
}
.ending-text.show { opacity: 1; pointer-events: auto; }



/* ✨ 스킬(패시브) 발동 팝업 애니메이션 */
@keyframes skillNotice {
  0% { opacity: 0; transform: scale(0.3) translateY(20px); filter: brightness(2); }
  15% { opacity: 1; transform: scale(1.2) translateY(-10px); filter: brightness(1.5); }
  30% { transform: scale(1) translateY(0); filter: brightness(1); }
  80% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-40px); }
}

.skill-notice {
  position: fixed;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10002;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1.8rem;
  color: #fff;
  text-shadow: 0 0 15px rgba(255,255,255,0.8), 2px 2px 4px rgba(0,0,0,0.5);
  pointer-events: none;
  animation: skillNotice 1.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
  white-space: nowrap;
}

/* 캐릭터별 전용 글로우(Glow) */
.skill-karona { text-shadow: 0 0 20px var(--accent); color: var(--accent); }
.skill-barber { text-shadow: 0 0 20px var(--scissors); color: #fff; }
.skill-quarrier { text-shadow: 0 0 20px var(--silver); color: #e0e0e0; }
.skill-tailor { text-shadow: 0 0 20px var(--win); color: var(--win); }




/* ═══ 🌙 뒷거래 (대격변 v6.0) ═══ */
.deal-panel { background:linear-gradient(180deg, var(--panel) 0%, #1a0f1f 100%); }
.dealer-img-frame {
  width:140px; height:140px; margin:0 auto;
  border-radius:50%; border:2px solid var(--accent);
  background-size:cover; background-position:center;
  background-color:var(--bg2);
  box-shadow:0 0 18px rgba(232,200,74,.25);
}
.deal-card-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;
}
.deal-card-option {
  background:var(--bg2); border:2px solid var(--border);
  border-radius:10px; padding:12px 6px; text-align:center;
  cursor:pointer; transition:all .2s;
  min-height:100px; display:flex; flex-direction:column; justify-content:center; gap:4px;
}
.deal-card-option:hover { transform:translateY(-2px); border-color:var(--accent); }
.deal-card-option.selected {
  border-color:var(--accent); background:rgba(232,200,74,.08);
  box-shadow:0 0 14px rgba(232,200,74,.25);
}
.deal-card-option .dco-icon { font-size:1.8rem; line-height:1; }
.deal-card-option .dco-name { font-size:.7rem; font-weight:700; }
.deal-card-option .dco-stats {
  font-family:'Rajdhani',sans-serif; font-size:.78rem;
  color:var(--text-dim); letter-spacing:.5px;
}
.deal-deck-card { cursor:pointer; transition:all .2s; }
.deal-deck-card:hover { transform:translateY(-3px); }
.deal-deck-card.selected {
  border-color:var(--danger) !important;
  box-shadow:0 0 14px rgba(240,74,106,.4) !important;
}

/* 🎴 거래상 카드 뒷면 (대격변 v7.1) */
.deal-card-back {
  background: linear-gradient(135deg, #2a1a3a 0%, #1a0f22 100%) !important;
  border-color: var(--purple) !important;
  cursor: default !important;
  position: relative;
  overflow: hidden;
}

/* 💗 보스 인트로 HP 비교 (대격변 v7.1) */
.intro-hp-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 14px;
  padding: 10px 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.intro-hp-block {
  flex: 1;
  text-align: center;
  padding: 4px 6px;
}
.intro-hp-label {
  font-size: .68rem;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.intro-hp-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: .5px;
}
.intro-hp-vs {
  font-family: 'Black Han Sans', sans-serif;
  color: var(--accent);
  font-size: .85rem;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.deal-card-back::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(45deg, transparent 0 6px, rgba(176,112,255,.08) 6px 12px);
  pointer-events: none;
}
.deal-card-back .dco-back-icon {
  font-size: 1.8rem;
  filter: drop-shadow(0 0 6px rgba(176,112,255,.5));
}
.deal-card-back .dco-back-text {
  font-family: 'Black Han Sans', sans-serif;
  font-size: .9rem;
  color: var(--purple);
  letter-spacing: 2px;
  margin-top: 4px;
}
.deal-card-back:hover { transform: none !important; }

@keyframes deal-card-flip {
  0% { transform: rotateY(180deg); opacity: 0; }
  50% { transform: rotateY(90deg); opacity: .5; }
  100% { transform: rotateY(0deg); opacity: 1; }
}
.deal-card-just-revealed {
  animation: deal-card-flip .5s ease-out;
}

/* 🌈 변종 카드 — 무지개 글로우 */
@keyframes variant-shimmer {
  0%, 100% { box-shadow: 0 0 8px rgba(255,126,184,.4); }
  25%      { box-shadow: 0 0 12px rgba(255,200,80,.5); }
  50%      { box-shadow: 0 0 12px rgba(94,255,126,.5); }
  75%      { box-shadow: 0 0 12px rgba(94,220,255,.5); }
}
.deal-card-variant {
  border-image: linear-gradient(45deg,#ff5e5e,#ffae5e,#fff85e,#5eff7e,#5edcff,#bf5eff) 1 !important;
  border-width: 2.5px !important;
  border-style: solid !important;
  background: linear-gradient(135deg, rgba(40,15,40,.95), rgba(20,15,40,.95)) !important;
  animation: variant-shimmer 3s ease-in-out infinite;
}
.deal-card-variant.selected {
  box-shadow: 0 0 18px rgba(255,126,184,.7) !important;
}

/* 🌈 변종 카드 글로벌 적용 (내 덱, 손패, 격돌 화면 모두 통일) */
.pip.tier-variant, .pip-variant {
  border-image: linear-gradient(45deg,#ff5e5e,#ffae5e,#fff85e,#5eff7e,#5edcff,#bf5eff) 1 !important;
  border-width: 2px !important;
  border-style: solid !important;
  background: linear-gradient(135deg, rgba(40,15,40,.8), rgba(20,15,40,.8)) !important;
}
.pip.tier-variant .pip-dmg { color: #ff7eb8 !important; }

/* 손패(큰 카드)로 들어왔을 때의 연출 */
.card.tier-variant {
  border-image: linear-gradient(45deg,#ff5e5e,#ffae5e,#fff85e,#5eff7e,#5edcff,#bf5eff) 1 !important;
  border-width: 2.5px !important;
  border-style: solid !important;
  background: linear-gradient(135deg, rgba(40,15,40,.95), rgba(20,15,40,.95)) !important;
  animation: variant-shimmer 3s ease-in-out infinite;
}
.card.tier-variant .card-dmg { color: #ff7eb8 !important; }
.card.tier-variant::after {
  content:'변종'; position:absolute; top:5px; right:6px;
  font-size:.44rem; letter-spacing:1px; color:#ff7eb8; font-family:'Black Han Sans', sans-serif;
}

/* 중앙에서 적과 맞붙을 때(Clash)의 연출 */
.clash-card.variant {
  border-image: linear-gradient(45deg,#ff5e5e,#ffae5e,#fff85e,#5eff7e,#5edcff,#bf5eff) 1 !important;
  border-width: 3px !important;
  border-style: solid !important;
  background: linear-gradient(135deg, rgba(40,15,40,.95), rgba(20,15,40,.95)) !important;
  animation: variant-shimmer 3s ease-in-out infinite;
}

/* 🌈 강화 화면 — 변종 카드 표시 */
.upg-card.variant-card {
  border: 2px solid transparent !important;
  border-image: linear-gradient(45deg,#ff5e5e,#ffae5e,#fff85e,#5eff7e,#5edcff,#bf5eff) 1 !important;
  background: linear-gradient(135deg, rgba(40,15,40,.6), rgba(20,15,40,.6)) !important;
}

/* ⚖️ 캐릭터 패시브 표시 (캐릭터 선택 화면) */
.char-passive {
  margin-top: 8px;
  padding: 7px 9px;
  background: rgba(232,200,74,.06);
  border: 1px dashed var(--accent);
  border-radius: 6px;
}
.char-passive-label {
  font-size: .72rem;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 2px;
}
.char-passive-desc {
  font-size: .68rem;
  color: var(--text-dim);
  line-height: 1.4;
}

/* 🎯 전투 화면 — 패시브 항상 표시 바 */
.player-passive-bar {
  margin-top: 8px;
  padding: 6px 10px;
  background: rgba(232,200,74,.05);
  border: 1px dashed var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.player-passive-bar .ppb-label {
  font-size: .68rem;
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
}
.player-passive-bar .ppb-desc {
  font-size: .65rem;
  color: var(--text-dim);
  line-height: 1.3;
}

/* ═══ 🗺️ 플로팅 지도 버튼 + 모달 (대격변 v7.0) ═══ */
#floating-map-btn {
  position: fixed;
  top: 12px;
  right: 12px;
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--bg2);
  border: 2px solid var(--accent);
  color: var(--accent);
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 14px rgba(232,200,74,.3);
  z-index: 900;
  transition: all .2s;
  padding: 0;
}
#floating-map-btn:hover { transform: scale(1.06); box-shadow: 0 0 18px rgba(232,200,74,.5); }
#floating-map-btn:active { transform: scale(.95); }

#map-modal {
  position: fixed;
  inset: 0;
  z-index: 950;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 12px;
}
.map-modal-bg {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.78);
  backdrop-filter: blur(4px);
  cursor: pointer;
}
.map-modal-panel {
  position: relative;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 400px;
  max-height: 90vh;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,.6);
  display: flex;
  flex-direction: column;
}
.map-modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.map-modal-close {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  font-size: .9rem;
  transition: all .15s;
}
.map-modal-close:hover { color: var(--text); border-color: var(--accent); }
.map-modal-body {
  padding: 8px;
  overflow-y: auto;
  background: #0d0d14;
}
.map-node-clickable { cursor: pointer; transition: opacity .2s; }
.map-node-clickable:hover { opacity: .85; }
.map-node-info { cursor: pointer; transition: filter .2s; }
.map-node-info:hover { filter: brightness(1.2); }

/* 🔍 적 정보 팝업 */
#enemy-detail-modal {
  position: fixed;
  inset: 0;
  z-index: 970;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 12px;
}
.enemy-detail-bg {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.82);
  backdrop-filter: blur(4px);
  cursor: pointer;
}
.enemy-detail-panel {
  position: relative;
  background: var(--panel);
  border: 2px solid var(--danger);
  border-radius: 14px;
  width: 100%;
  max-width: 380px;
  max-height: 90vh;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(240,74,106,.3);
  display: flex;
  flex-direction: column;
}
.enemy-detail-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.enemy-detail-body {
  padding: 14px 16px;
  overflow-y: auto;
}
.enemy-detail-img {
  width: 100px;
  height: 100px;
  border-radius: 10px;
  border: 2px solid var(--danger);
  background-size: 130%;
  background-position: center 20%;
  background-color: var(--bg2);
  flex-shrink: 0;
  box-shadow: 0 0 12px rgba(240,74,106,.25);
}

/* 💥 화면 흔들림 효과 */
@keyframes shakeHard {
  0% { transform: translate(2px, 2px) rotate(0deg); }
  20% { transform: translate(-3px, -2px) rotate(-1deg); }
  40% { transform: translate(3px, 0px) rotate(1deg); }
  60% { transform: translate(-2px, 3px) rotate(0deg); }
  80% { transform: translate(2px, -1px) rotate(-1deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}
@keyframes shakeLight {
  0% { transform: translate(1px, 1px); }
  25% { transform: translate(-1px, -1px); }
  50% { transform: translate(1px, 0px); }
  75% { transform: translate(-1px, 1px); }
  100% { transform: translate(0, 0); }
}
.shake-hard { animation: shakeHard 0.4s cubic-bezier(.36,.07,.19,.97) both; }
.shake-light { animation: shakeLight 0.3s cubic-bezier(.36,.07,.19,.97) both; }

/* 💥 데미지 팝업 숫자 */
@keyframes popUpDmg {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  20% { opacity: 1; transform: translateY(-20px) scale(1.3); }
  80% { opacity: 1; transform: translateY(-40px) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(0.8); }
}
.dmg-popup {
  position: fixed; /* 💡 부모 상자의 overflow 설정을 무시하고 화면 최상단에 띄움 */
  font-family: var(--font-main); /* 💡 뭉개지지 않는 선명한 폰트 적용 */
  font-weight: 900;
  font-size: 3.2rem;
  pointer-events: none;
  z-index: 11000; /* 💡 다른 어떤 UI보다 위에 오도록 설정 */
  animation: popUpDmg 1s ease-out forwards;
  text-shadow: 0 0 15px rgba(0,0,0,0.8), 3px 3px 0px #000;
  transform: translateX(-50%); /* 💡 중앙 정렬 기준점 */
  text-align: center;
}

/* ❤️ 빈사 상태 (HP 25% 미만) 붉은 아우라 */
@keyframes pulseDanger {
  0% { box-shadow: 0 0 8px rgba(240,74,106,0.3); border-color: rgba(240,74,106,0.4); }
  50% { box-shadow: 0 0 25px rgba(240,74,106,0.85); border-color: rgba(240,74,106,1); }
  100% { box-shadow: 0 0 8px rgba(240,74,106,0.3); border-color: rgba(240,74,106,0.4); }
}
.hp-danger {
  animation: pulseDanger 0.8s infinite !important;
  border: 2px solid var(--danger) !important;
  background: rgba(240,74,106,0.05);
}

/* ═══ PANEL ═══ */
.panel { background:var(--panel); border:1px solid var(--border); border-radius:11px; padding:12px 16px; }

/* ═══ HP ═══ */
#hp-area { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
/* HP 블록: 적 이미지가 배경에 깔리도록 설정 */
.hp-block {
  display: flex; flex-direction: column; gap: 6px;
  position: relative; overflow: hidden;
  border-radius: 10px; padding: 14px 12px; min-height: 80px;
}

/* 적 에셋이 들어갈 투명 배경 레이어 */
.enemy-bg-sprite {
  position: absolute;
  top: 0; right: 0;
  width: 200px; height: 200px;
  background-size: cover;
  background-position: center;
  opacity: 0.35; /* 글씨 방해 안 되게 더 은은하게 조절 */
  z-index: 0;
  pointer-events: none;
}

/* 글씨와 바가 이미지 위로 오게 함 */
.hp-label, .hp-track { position: relative; z-index: 1; }

.hp-label { font-size: .62rem; letter-spacing: 2px; color: var(--text-dim); display: flex; justify-content: space-between; }
.hp-label span:last-child { color: var(--text); font-weight: 700; }

/* HP 바 트랙: 숫자에 맞게 너비 조절 가능하도록 수정 */
.hp-track {
  height: 10px;
  background: rgba(255, 255, 255, .05);
  border-radius: 6px;
  overflow: hidden;
  width: var(--max-w, 100%); /* 자바스크립트에서 보낸 너비 적용 */
  min-width: 60px;
}

/* 기존 색상 및 애니메이션 로직 유지 */
.hp-fill { height: 100%; border-radius: 6px; transition: width .55s cubic-bezier(.4, 0, .2, 1); }
#player-hp-fill { background: linear-gradient(90deg, #4af0c8, #38c8a0); }
#enemy-hp-fill  { background: linear-gradient(90deg, #f04a6a, #c02848); }

/* ═══ DECK TRACKER ═══ */
#tracker-area { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.tracker-block { display:flex; flex-direction:column; gap:8px; }
.tracker-title {
  font-size:.6rem; letter-spacing:2px; color:var(--text-dim);
  display:flex; justify-content:space-between; align-items:center;
}
.reshuffle-badge {
  font-size:.5rem; letter-spacing:1px;
  background:rgba(74,240,200,.1); color:var(--accent2);
  border:1px solid rgba(74,240,200,.25);
  border-radius:4px; padding:1px 6px;
  animation:blink 1s ease infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

.pip-row { display:flex; gap:6px; flex-wrap:wrap; }

/* ─── PIP CARDS (62×80) ─── */
.pip {
  width:62px; height:80px;
  border-radius:10px; border:2px solid var(--border);
  background:var(--bg2);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:3px; position:relative; flex-shrink:0;
  transition:all .25s;
}
.pip .pip-icon  { font-size:2rem; line-height:1; }
.pip .pip-label { font-size:.5rem; letter-spacing:.8px; font-family:'Orbitron',sans-serif; }
.pip .pip-dmg   {
  font-family:'Rajdhani', sans-serif;
  font-size:.85rem; font-weight:700;
  position:absolute; bottom:4px; right:5px;
  letter-spacing:.5px;
}
.pip.scissors   { border-color:var(--scissors); }
.pip.scissors   .pip-label { color:var(--scissors); }
.pip.rock       { border-color:var(--rock); }
.pip.rock       .pip-label { color:var(--rock); }
.pip.paper      { border-color:var(--paper); }
.pip.paper      .pip-label { color:var(--paper); }
.pip.tier-normal .pip-dmg  { color:var(--normal-c); }
.pip.tier-silver            { border-color:var(--silver); box-shadow:0 0 10px var(--glow-silver); }
.pip.tier-silver .pip-dmg  { color:var(--silver); }
.pip.tier-gold              { border-color:var(--gold);   box-shadow:0 0 14px var(--glow-gold); }
.pip.tier-gold   .pip-dmg  { color:var(--gold); }
.pip.spent       { opacity:.14; filter:grayscale(1); box-shadow:none !important; }
.pip.enemy-drawn { opacity:.14; filter:grayscale(1); box-shadow:none !important; }
.pip.enemy-unknown {
  background:rgba(255,107,138,.04);
  border-color:rgba(255,107,138,.2);
}
.pip.enemy-unknown .pip-icon { font-size:1.6rem; color:var(--enemy); opacity:.4; }
.pip.enemy-unknown.tier-silver { border-color:var(--silver); box-shadow:0 0 10px var(--glow-silver); }
.pip.enemy-unknown.tier-gold   { border-color:var(--gold);   box-shadow:0 0 14px var(--glow-gold); }

/* ═══ LOG ═══ */
#log-area {
  min-height:80px; max-height:125px; overflow-y:auto;
  display:flex; flex-direction:column; gap:3px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.log-entry {
  font-size:.74rem; line-height:1.5;
  padding:3px 9px; border-radius:4px;
  background:rgba(255,255,255,.022);
  border-left:3px solid var(--muted);
  animation:slideIn .22s ease;
}
.log-entry.win       { border-color:var(--win);   color:var(--win); }
.log-entry.lose      { border-color:var(--lose);  color:var(--lose); }
.log-entry.draw      { border-color:var(--draw);  color:var(--draw); }
.log-entry.info      { border-color:var(--accent2); color:var(--accent2); }
.log-entry.enemy-log { border-color:var(--enemy); color:rgba(255,107,138,.85); }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

/* ═══ HAND ZONE ═══ */
#hand-zone  { display:flex; flex-direction:column; gap:9px; }
#draw-btn-wrap { display:flex; justify-content:center; }
/* 6장 오픈 핸드: 3열 2행 */
#hand-area  { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; min-height:unset; }

/* ─── 모바일 미디어 쿼리 ─── */
@media (max-width: 400px) {
  #hand-area { grid-template-columns: repeat(3,1fr); gap:5px; }
  .card { padding: 10px 4px 8px; gap:5px; }
  .card-icon { font-size: 1.6rem; }
  .card-dmg  { font-size: 1rem; }
  .pip { width:44px; height:58px; }
  .pip .pip-icon { font-size:1.4rem; }
}

/* ─── HAND CARD ─── */
.card {
  background:var(--bg2); border:2px solid var(--border);
  border-radius:14px; padding:18px 10px 15px;
  display:flex; flex-direction:column;
  align-items:center; gap:8px;
  cursor:pointer; position:relative;
  transition:transform .17s, border-color .17s, box-shadow .17s;
  user-select:none; overflow:hidden;
}
.card::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.05),transparent 60%);
  pointer-events:none;
}
.card:hover:not(.used-card):not(.card-placeholder) {
  transform:translateY(-8px) scale(1.04);
  box-shadow:0 14px 32px rgba(0,0,0,.5);
}
.card.scissors { border-color:var(--scissors); }
.card.scissors:hover:not(.used-card) { box-shadow:0 0 22px rgba(240,160,48,.3); }
.card.rock     { border-color:var(--rock); }
.card.rock:hover:not(.used-card)     { box-shadow:0 0 22px rgba(96,144,240,.3); }
.card.paper    { border-color:var(--paper); }
.card.paper:hover:not(.used-card)    { box-shadow:0 0 22px rgba(96,216,112,.3); }

.card.tier-silver { border-color:var(--silver); box-shadow:0 0 10px var(--glow-silver); }
.card.tier-gold   { border-color:var(--gold);   box-shadow:0 0 14px var(--glow-gold); }
.card.tier-gold::after {
  content:'골드'; position:absolute; top:5px; right:6px;
  font-size:.44rem; letter-spacing:1.5px; color:var(--gold); font-family:'Orbitron',sans-serif;
}
.card.tier-silver::after {
  content:'실'; position:absolute; top:5px; right:6px;
  font-size:.44rem; letter-spacing:1.5px; color:var(--silver); font-family:'Orbitron',sans-serif;
}

/* ── 사용한 카드: 완전히 숨김 (opacity 0 + pointer-events none) ── */
.card.used-card {
  opacity:0 !important;
  pointer-events:none !important;
  transform:scale(.85) !important;
  transition:opacity .25s ease, transform .25s ease !important;
}

.card-placeholder {
  border:2px dashed rgba(255,255,255,.07);
  background:transparent; cursor:default; min-height:150px;
}
.card-icon { font-size:2.4rem; line-height:1; }
.card-name { font-size:.65rem; letter-spacing:2px; color:var(--text-dim); }
/* ── DMG 폰트: Rajdhani (가독성 좋은 military 폰트) ── */
.card-dmg {
  font-family:'Rajdhani', sans-serif;
  font-size:1.4rem; font-weight:700;
  letter-spacing:1px; line-height:1;
}
.card.scissors .card-dmg { color:var(--scissors); }
.card.rock     .card-dmg { color:var(--rock); }
.card.paper    .card-dmg { color:var(--paper); }
.card.tier-silver .card-dmg { color:var(--silver); }
.card.tier-gold   .card-dmg { color:var(--gold); }

/* ─── DEAL ANIMATION: rise from below ─── */
@keyframes dealRise {
  0%   { opacity:0; transform:translateY(70px) scale(.75) rotate(4deg); }
  65%  { transform:translateY(-8px) scale(1.05) rotate(-1deg); }
  100% { opacity:1; transform:translateY(0) scale(1) rotate(0deg); }
}
.card.dealing { animation:dealRise .45s cubic-bezier(.34,1.3,.64,1) both; }

/* ═══ BUTTONS ═══ */
.btn {
  border:none; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  font-weight:700; border-radius:9px;
  transition:all .17s; letter-spacing:1px;
}
.btn-primary { background:var(--accent); color:#09090f; padding:13px 28px; font-size:.84rem; }
.btn-primary:hover { background:#f0d860; transform:translateY(-2px); }
.btn-primary:disabled { opacity:.3; cursor:not-allowed; transform:none !important; }
.btn-draw {
  background:linear-gradient(135deg,#1c2040,#252a50);
  color:var(--accent2); border:1px solid var(--accent2);
  padding:11px 32px; font-size:.82rem; letter-spacing:2px;
  box-shadow:0 0 12px rgba(74,240,200,.15);
}
.btn-draw:hover { background:rgba(74,240,200,.12); transform:translateY(-2px); box-shadow:0 0 20px rgba(74,240,200,.25); }
.btn-draw:disabled { opacity:.3; cursor:not-allowed; transform:none; box-shadow:none; }

/* ═══ TITLE SCREEN ═══ */
#title-screen { text-align:center; padding:34px 0; min-height:90vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#boss-intro { text-align:center; padding:20px 20px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:85vh; }

/* 영문 타이틀: 상단 배치, 대형, 사이언 네온 효과 */
.hero-en { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.8rem; letter-spacing: 2px; color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.8), 0 0 20px rgba(0, 243, 255, 0.4); margin-bottom: 5px; animation: glow-cyan 2s ease-in-out infinite alternate; }

/* 한글 타이틀: 하단 배치, 중형, 마젠타 네온 효과 */
.hero-ko { font-family: var(--font-main); font-weight: 800; font-size: 1.1rem; color: #4af0c8; text-shadow: 0 0 8px rgba(255, 0, 85, 0.6); letter-spacing: 10px; margin-top: -5px; margin-bottom: 30px; }

/* 비활성화된 버튼 및 네온 애니메이션 추가 */
.btn-disabled { background: #1a1a2e !important; color: #444 !important; border: 1px solid #333 !important; cursor: not-allowed !important; opacity: 0.6; box-shadow: none !important; transform: none !important; }
@keyframes glow-cyan { from { text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); } to { text-shadow: 0 0 25px rgba(0, 243, 255, 0.9); } }

.hero-ver { font-family:'Orbitron',sans-serif; font-size:.6rem; letter-spacing:5px; color:var(--muted); margin-bottom:18px; }
.rps-deco { font-size:3rem; margin:12px 0; display:flex; justify-content:center; gap:22px; }
.rps-deco span { animation:float 3s ease-in-out infinite; }
.rps-deco span:nth-child(2){animation-delay:.5s}
.rps-deco span:nth-child(3){animation-delay:1s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

/* ═══ OPTION CARDS ═══ */
/* 휴게소 배경 */
.reststop-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: linear-gradient(135deg, #0a1a1a 0%, #0d2020 50%, #081818 100%);
}
.reststop-bg::after {
  content: '';
  position: absolute; inset: -50%;
  background-image: radial-gradient(circle, rgba(74,240,200,.06) 1px, transparent 1px);
  background-size: 30px 30px;
  animation: driftBg 20s linear infinite;
}
@keyframes driftBg { from{transform:translate(0,0)} to{transform:translate(30px,30px)} }

.option-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:14px 0; }
.option-card {
  border:2px solid var(--border); border-radius:13px;
  padding:18px 12px; text-align:center;
  cursor:pointer; background:var(--bg2); transition:all .2s;
}
.option-card:hover { transform:translateY(-3px); }
.option-card.bakkus:hover  { border-color:var(--danger); box-shadow:0 0 14px rgba(240,74,106,.18); }
.option-card.upgrade:hover { border-color:var(--silver); box-shadow:0 0 14px var(--glow-silver); }
.option-card.selected.bakkus  { border-color:var(--danger); background:rgba(240,74,106,.07); }
.option-card.selected.upgrade { border-color:var(--silver); background:rgba(184,208,240,.06); }
.opt-icon { font-size:2.1rem; margin-bottom:7px; }
.opt-name { font-family:'Black Han Sans',sans-serif; font-size:.95rem; margin-bottom:5px; }
.opt-desc { font-size:.68rem; color:var(--text-dim); line-height:1.65; }

.upgrade-pick { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:8px 0; }
.upg-card {
  border:1.5px solid var(--border); border-radius:9px;
  padding:11px 6px; text-align:center;
  cursor:pointer; background:var(--bg2); transition:all .17s;
}
.upg-card:hover:not(.locked) { border-color:var(--accent); transform:translateY(-2px); }
.upg-card.selected { border-color:var(--accent); background:rgba(232,200,74,.07); }
.upg-card.locked   { opacity:.32; cursor:not-allowed; }
.uc-icon { font-size:1.45rem; }
.uc-name { color:var(--text-dim); margin:3px 0 2px; font-size:.56rem; letter-spacing:1px; }
.uc-dmg  { font-family:'Rajdhani',sans-serif; font-size:.82rem; font-weight:700; letter-spacing:.5px; }

.modal-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:14px; }

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ═══ BOSS INTRO SCREEN ═══ */
.boss-img-frame {
  width:240px; height:240px; border:4px solid var(--border); border-radius:15px;

background-size: contain;      /* cover 대신 contain으로 변경 */
  background-position: top center; /* center 대신 top center로 변경 */
  background-repeat: no-repeat;  /* 이미지가 반복되지 않게 추가 */
  background-color: #000;        /* 빈 공간을 검은색으로 채움 */
  margin-bottom:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.6); animation: bossPop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes bossPop { from{opacity:0; transform:scale(.7) rotate(-5deg)} to{opacity:1; transform:scale(1) rotate(0deg)} }
.boss-dialogue {
  font-weight: 500;
  font-size: 1.1rem;
  font-family:'Black Han Sans', sans-serif; font-size:1.15rem; color:var(--accent2);
  line-height:1.6; margin-bottom:25px; min-height:60px; word-break:keep-all;
}
  /* ═══ BATTLE CLASH SYSTEM (추가) ═══ */
#clash-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; pointer-events: none;
}
#clash-overlay.active { display: flex; pointer-events: auto; }

.clash-stage { display: flex; align-items: center; gap: 20px; position: relative; flex-wrap: wrap; justify-content: center; }
.clash-card {
  width: 110px; height: 160px; background: var(--bg2);
  border: 3px solid var(--border); border-radius: 15px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@media (max-width: 400px) {
  .clash-card { width: 85px; height: 125px; }
  .clash-vs { font-size: 1.4rem !important; }
  #clash-result-text { font-size: 1.1rem !important; margin-top: 20px !important; }
}

/* 카드 등장 애니메이션 */
.player-clash-card { transform: translateX(-150%) scale(0.5); opacity: 0; }
.enemy-clash-card { transform: translateX(150%) scale(0.5); opacity: 0; }

.active .player-clash-card { transform: translateX(0) scale(1.2); opacity: 1; }
.active .enemy-clash-card { transform: translateX(0) scale(1.2); opacity: 1; }

/* 승리/패배 효과 */
.clash-card.winner { border-color: var(--win); box-shadow: 0 0 30px var(--win); transform: scale(1.3); }
.clash-card.loser { opacity: 0; transform: scale(0.8) translateY(50px); filter: grayscale(1); }
.clash-card.draw-card { border-color: var(--draw); transform: scale(1.1); }

.clash-vs { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--accent); font-weight: 900; }
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     ❶  BGM — backgroundmusic.mp3
     서버에 backgroundmusic.mp3 파일을 같은 경로에 업로드하면
     자동으로 루프 재생됩니다. 파일이 없으면 조용히 무시됩니다.
     ════════════════════════════════════════ -->
<audio id="bgm-track" src="backgroundmusic.mp3" loop preload="none"></audio>
<audio id="bgm-rest"  src="PixelBudgetLoop.mp3"  loop preload="none"></audio>
<audio id="bgm-boss"  src="finalbossmoon.mp3" loop preload="none"></audio>
<audio id="bgm-deal"  src="undergrounddealer.mp3" loop preload="none"></audio>
<audio id="bgm-gameover" src="GameOverScreen.mp3" preload="none"></audio>
<audio id="bgm-ending" src="endingmusic.mp3" preload="none"></audio>
  
<div id="clash-overlay">
  <div class="clash-stage">
    <div id="p-clash" class="clash-card player-clash-card"></div>
    <div class="clash-vs">VS</div>
    <div id="e-clash" class="clash-card enemy-clash-card"></div>
  </div>
  <div id="clash-result-text" style="margin-top:40px; font-family:'Black Han Sans'; font-size:1.5rem;"></div>
</div>
  
<script>
/* ══ BGM 시스템 v5.0 ══
   - battle BGM: backgroundmusic.mp3 (위치 기억, 페이드인 복귀)
   - rest BGM:   PixelBudgetLoop.mp3 (볼륨 7%, 잔잔하게)
   - 전환 시 크로스페이드 0.8초
*/
const BGM = {
  battle: null,
  rest:   null,
  boss:   null,
  deal:   null,
  ending: null,
  _battleStarted: false,
  _current: null,

  init(){
    this.battle = document.getElementById('bgm-track');
    this.rest   = document.getElementById('bgm-rest');
    this.boss   = document.getElementById('bgm-boss');
    this.deal   = document.getElementById('bgm-deal');
    this.ending = document.getElementById('bgm-ending');
    if(this.rest) this.rest.volume = 0.35;
  },

  /* 페이드 유틸 */
  _fade(el, fromVol, toVol, duration, cb){
    if(!el) return;
    const steps = 20;
    const interval = duration / steps;
    const delta = (toVol - fromVol) / steps;
    let step = 0;
    el.volume = Math.max(0, Math.min(1, fromVol));
    const t = setInterval(()=>{
      step++;
      el.volume = Math.max(0, Math.min(1, fromVol + delta * step));
      if(step >= steps){ clearInterval(t); if(cb) cb(); }
    }, interval);
  },

  /* 전투 BGM — 위치 기억, 페이드인 */
  playBattle(){
    if(this._current === 'battle') return;
    if(this._current === 'rest' && this.rest){ this._fade(this.rest, this.rest.volume, 0, 800, ()=>{ this.rest.pause(); }); }
    if(this._current === 'boss' && this.boss){ this._fade(this.boss, this.boss.volume, 0, 800, ()=>{ this.boss.pause(); }); }
    if(this._current === 'deal' && this.deal){ this._fade(this.deal, this.deal.volume, 0, 800, ()=>{ this.deal.pause(); }); }
    this._current = 'battle';
    if(!this.battle) return;
    this.battle.volume = 0;
    this.battle.play().catch(()=>{});
    this._battleStarted = true;
    this._fade(this.battle, 0, 0.35, 1200);
  },

  /* 보스 BGM (문동진 전용) — 페이드인 */
  playBoss(){
    if(this._current === 'boss') return;
    if(this._current === 'battle' && this.battle){ this._fade(this.battle, this.battle.volume, 0, 800, ()=>{ this.battle.pause(); }); }
    if(this._current === 'rest' && this.rest){ this._fade(this.rest, this.rest.volume, 0, 800, ()=>{ this.rest.pause(); }); }
    if(this._current === 'deal' && this.deal){ this._fade(this.deal, this.deal.volume, 0, 800, ()=>{ this.deal.pause(); }); }
    this._current = 'boss';
    if(!this.boss) return;
    this.boss.volume = 0;
    this.boss.play().catch(()=>{});
    this._battleStarted = true;
    this._fade(this.boss, 0, 0.35, 1200);
  },

  /* 휴게소 BGM — 전투 위치 저장 후 전환 */
  playRest(){
    if(this._current === 'rest') return;
    if(this._current === 'battle' && this.battle){ this._fade(this.battle, this.battle.volume, 0, 800, ()=>{ this.battle.pause(); }); }
    if(this._current === 'boss' && this.boss){ this._fade(this.boss, this.boss.volume, 0, 800, ()=>{ this.boss.pause(); }); }
    if(this._current === 'deal' && this.deal){ this._fade(this.deal, this.deal.volume, 0, 800, ()=>{ this.deal.pause(); }); }
    this._current = 'rest';
    if(!this.rest) return;
    this.rest.volume = 0;
    this.rest.play().catch(()=>{});
   this._fade(this.rest, 0, 0.35, 1200);
  },

  /* 🌙 뒷거래 BGM — 페이드인 */
  playDeal(){
    if(this._current === 'deal') return;
    if(this._current === 'battle' && this.battle){ this._fade(this.battle, this.battle.volume, 0, 800, ()=>{ this.battle.pause(); }); }
    if(this._current === 'rest' && this.rest){ this._fade(this.rest, this.rest.volume, 0, 800, ()=>{ this.rest.pause(); }); }
    if(this._current === 'boss' && this.boss){ this._fade(this.boss, this.boss.volume, 0, 800, ()=>{ this.boss.pause(); }); }
    this._current = 'deal';
    if(!this.deal) return;
    this.deal.volume = 0;
    this.deal.play().catch(()=>{});
    this._fade(this.deal, 0, 0.35, 1200);
  },

  /* 처음 시작 (첫 클릭) */
  play(){
    if(!this._battleStarted) this.playBattle();
  },

  playGameOver(){
    if(this.battle){ this._fade(this.battle, this.battle.volume, 0, 800, ()=>{ this.battle.pause(); }); }
    if(this.rest)  { this._fade(this.rest, this.rest.volume, 0, 800, ()=>{ this.rest.pause(); }); }
    if(this.boss)  { this._fade(this.boss, this.boss.volume, 0, 800, ()=>{ this.boss.pause(); }); }
    this._current = null;
    const go = document.getElementById('bgm-gameover');
    if(go){ go.volume=0.4; go.currentTime=0; go.play().catch(()=>{}); }
  },

  playVictory(){
    if(this.battle){ this._fade(this.battle, this.battle.volume, 0, 800, ()=>{ this.battle.pause(); }); }
    if(this.rest)  { this._fade(this.rest, this.rest.volume, 0, 800, ()=>{ this.rest.pause(); }); }
    if(this.boss)  { this._fade(this.boss, this.boss.volume, 0, 800, ()=>{ this.boss.pause(); }); }
    this._current = null;
    const vic = document.getElementById('bgm-victory');
    if(vic){ vic.volume=0.4; vic.currentTime=0; vic.play().catch(()=>{}); }
  },

  playEnding(){ 
    this.stop(); 
    this._current = 'ending';
    if(this.ending){
      this.ending.volume = 0;
      this.ending.currentTime = 0;
      this.ending.play().catch(()=>{});
      this._fade(this.ending, 0, 0.4, 1500); 
    }
  },

  stop(){
    if(this.battle){ this.battle.pause(); this.battle.currentTime=0; }
    if(this.rest)  { this.rest.pause(); }
    if(this.boss)  { this.boss.pause(); this.boss.currentTime=0; }
    if(this.ending){ this.ending.pause(); this.ending.currentTime=0; }
    
    const go = document.getElementById('bgm-gameover');
    if(go){ go.pause(); go.currentTime = 0; }
    const vic = document.getElementById('bgm-victory');
    if(vic){ vic.pause(); vic.currentTime = 0; }

    this._current = null;
    this._battleStarted = false;
  }
}; // 👈 이 괄호 하나가 빠져서 화면 전체가 먹통이 됐던 겁니다!

window.addEventListener('DOMContentLoaded', ()=> BGM.init());
document.addEventListener('click', ()=>{ if(!BGM._battleStarted) BGM.play(); }, { once: true });
</script>

<!-- ════════════════════════════════════════
     ❷  SFX ENGINE  (Web Audio API)
     ════════════════════════════════════════ -->
<script>
const SFX = (()=>{
  let ctx = null;
  function c(){ return ctx || (ctx = new (window.AudioContext||window.webkitAudioContext)()); }

  function osc(freq, type, t, dur, gain, ctx){
    const g=ctx.createGain(), o=ctx.createOscillator();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(gain,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+dur);
  }
  function noise(t, dur, gain, freq, ctx){
    const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const src=ctx.createBufferSource(), filt=ctx.createBiquadFilter(), g=ctx.createGain();
    filt.type='bandpass'; filt.frequency.value=freq||800; filt.Q.value=1.5;
    g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(ctx.destination);
    src.start(t); src.stop(t+dur);
  }
  return {
    draw(){  const x=c(), t=x.currentTime; noise(t,.09,.22,800,x); osc(220,'sawtooth',t,.09,.07,x); },
    play(){  const x=c(), t=x.currentTime; noise(t,.12,.35,600,x); osc(180,'square',t,.08,.1,x); osc(90,'sine',t+.04,.12,.12,x); },
    win(){   const x=c(), t=x.currentTime; [523,659,784,1047].forEach((f,i)=>osc(f,'triangle',t+i*.09,.28,.12,x)); },
    lose(){  const x=c(), t=x.currentTime; osc(120,'sawtooth',t,.32,.18,x); osc(80,'sine',t+.05,.4,.15,x); },
    drawSfx(){ const x=c(), t=x.currentTime; osc(440,'sine',t,.12,.1,x); osc(440,'sine',t+.14,.12,.08,x); },
    heal(){  const x=c(), t=x.currentTime; [880,1100,1320].forEach((f,i)=>osc(f,'sine',t+i*.07,.2,.1,x)); },
    upgrade(){ const x=c(), t=x.currentTime; [440,554,659,880,1108].forEach((f,i)=>osc(f,'triangle',t+i*.07,.3,.1,x)); },
    stageClear(){ const x=c(), t=x.currentTime; [523,659,784,659,784,1047].forEach((f,i)=>osc(f,'triangle',t+i*.1,.3,.11,x)); },
    /* 🌙 뒷거래 — 터벅터벅 발걸음 (낮은 노이즈 + 둔탁한 베이스) */
    deal(){
      const x=c(), t=x.currentTime;
      [0, .25, .5, .75].forEach(d => {
        noise(t+d, .12, .18, 200, x);
        osc(60, 'sine', t+d, .14, .2, x);
      });
    },
    /* 💔 HP 손실 — 짧고 아픈 톤 */
    hpLoss(){
      const x=c(), t=x.currentTime;
      osc(330,'sawtooth',t,.18,.2,x);
      osc(165,'square',t+.05,.22,.18,x);
      noise(t,.18,.12,500,x);
    }
  };
})();
</script>

function cardDmg(c){
  if(c.tier === 'variant') return VARIANT_STATS[c.type]?.dmg ?? 0;

  let base;
  if(c.tier === 'variant') base = VARIANT_STATS[c.type]?.shield ?? 0;
  else base = TIER[c.tier].shield;

  if(c.type === 'rock' && G.character === 'quarrier') base += 2;
  return base;
}

/* 🔍 미리보기용: 특정 캐릭터의 패시브를 가정한 카드 실드 계산 */

function makeCard(type, tier='normal'){

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* ❺ 뒷거래 시스템 (대격변 v8.0) — 변종 카드 추가 */
const DEAL_TIER_PROBS = [
  { tier: 'normal',  weight: 20 },  // 60→20
  { tier: 'silver',  weight: 35 },  // 30→35
  { tier: 'gold',    weight: 30 },  // 10→30
  { tier: 'variant', weight: 15 }   // 신규 변종
];
function weightedPick(table){
  const total = table.reduce((s, x) => s + x.weight, 0);
  let r = Math.random() * total;
  for(const item of table){
    r -= item.weight;
    if(r <= 0) return item;
  }
  return table[table.length - 1];
}
function generateDealCards(count = 3){
  const cards = [];
  const types = ['scissors', 'rock', 'paper'];
  for(let i = 0; i < count; i++){
    const tierPick = weightedPick(DEAL_TIER_PROBS);
    const type = types[Math.floor(Math.random() * 3)];
    cards.push(makeCard(type, tierPick.tier));
  }
  return cards;
}

<script>
/*
  v4.5 핵심 설계: 6덱 오픈 핸드
  G.handDealt   = false  → 카드 받기 버튼 활성, 손패 빈 슬롯 표시
  G.handDealt   = true   → 손패 6장 전체 표시, 버튼 비활성
  G.usedInHand  = 낸 카드 인덱스 배열 (render에서 used-card 클래스 부여)
  6장 모두 낸 뒤 → G.handDealt=false, 버튼 재활성 (새 6장 받기)
*/
const G = {
  screen:'title', stageIdx:0,
  character: null,
  logFolded: true,
  enemyDeckOpen: false,
  isGameOver: false,        // 게임오버/클리어 후 카드 클릭 차단
  isClashing: false, // 💡 전투 연출 중 클릭을 막기 위한 잠금 변수 추가
  playerHp:10, playerMaxHp:10,
  deck:[], drawPile:[], discardPile:[],
  hand:[], usedInHand:[],
  handDealt:false,         // true면 손패 표시, false면 빈 슬롯
  dealAnimating:false,     // 딜 애니 중이면 클릭 차단
  enemyHp:0, enemyMaxHp:0,
  enemyDeck:[], enemyDrawPile:[], enemyDiscardPile:[],
  cpuPersonality:null,
  playerHistory:[],
  dealCards:[], dealPickIdx:null, dealReplaceIdx:null, dealStep:'intro',
  dealRevealed:[false, false, false],
  currentNodeId: null,
  visitedNodes: [],
  mapModalOpen: false,
  seenEnemies: [],            // 🗺️ 현재 회차에서 만나본 적의 subBossKey 또는 stageIdx-기반 키
  enemyDetailNodeId: null,    // 적 상세 팝업: 어느 노드를 보고 있는지
  log:[]
};

/* ── 플레이어 드로우: 6장 전부 오픈 ── */
function drawPlayerHand(){
  // 남은 드로우가 6장 미만이면 discard 합쳐서 재구성
  if(G.drawPile.length < 6){
    G.drawPile = shuffle([...G.drawPile, ...G.discardPile]);
    G.discardPile = [];
    if(G.drawPile.length > 0) addLog('📦 덱을 재구성했습니다.','info');
  }
  // 6장 전부 드로우
  G.hand = G.drawPile.splice(0, 6);
  G.discardPile.push(...G.hand);
  G.usedInHand = [];
}

/* ── 성향 키를 실제 동작 모드로 변환 ── */
function getActualPersonality(personalityKey){
  const p = PERSONALITIES.find(x => x.key === personalityKey);
  if(!p) return 'aggressive'; // fallback
  if(p.mode === 'pure') return p.base;
  if(p.mode === 'master'){
    if(Math.random() < (p.mainRate || 0.7)) return p.base;
    const others = ['aggressive','counter','careful'].filter(x => x !== p.base);
    return others[Math.floor(Math.random() * others.length)];
  }
  // special 모드: chaotic / analyst 그대로 리턴
  return p.base;
}

/* ── CPU AI (v4.5: 6장 오픈 핸드 대응) ──
   플레이어 핸드가 오픈이므로 아직 안 낸 카드를 정확히 파악 */
function cpuPickCard(){
  if(G.enemyDrawPile.length===0){
    /* 적 덱 소진 → 원본 6장으로 완전 리셋 */
    G.enemyDrawPile    = shuffle([...G.enemyDeck]);
    G.enemyDiscardPile = [];
    addLog('🔄 적이 덱을 재구성했습니다!','enemy-log');
  }
  // 플레이어가 아직 안 낸 카드 (6장 오픈이므로 정확히 앎)
  const remaining = G.hand.filter((_,i) => !G.usedInHand.includes(i));
  const total = remaining.length || 1;
  const prob={scissors:0,rock:0,paper:0};
  remaining.forEach(c=>prob[c.type]+=1/total);

  const p=getActualPersonality(G.cpuPersonality);

  // 🎲 혼돈형: 완전 무작위 선택
  if(p==='chaotic'){
    const idx = Math.floor(Math.random() * G.enemyDrawPile.length);
    const chosen = G.enemyDrawPile[idx];
    G.enemyDrawPile.splice(idx,1);
    G.enemyDiscardPile.push(chosen);
    return chosen;
  }

  // 🧠 분석형: 플레이어 누적 카드 히스토리 기반 카운터
  if(p==='analyst'){
    if(!G.playerHistory || G.playerHistory.length === 0){
      // 첫 턴: 정보 없음 → 랜덤
      const idx = Math.floor(Math.random() * G.enemyDrawPile.length);
      const chosen = G.enemyDrawPile[idx];
      G.enemyDrawPile.splice(idx,1);
      G.enemyDiscardPile.push(chosen);
      return chosen;
    }
    const counts = {scissors:0, rock:0, paper:0};
    G.playerHistory.forEach(t => counts[t]++);
    const mostUsed = Object.keys(counts).reduce((a,b) => counts[a]>=counts[b]?a:b);
    const beatsMap = {paper:'scissors', scissors:'rock', rock:'paper'};
    const targetType = beatsMap[mostUsed];
    let candidates = G.enemyDrawPile.filter(c => c.type === targetType);
    if(!candidates.length) candidates = [G.enemyDrawPile[0]];
    const tierOrder = {gold:3, silver:2, normal:1};
    candidates.sort((a,b) => tierOrder[b.tier] - tierOrder[a.tier]);
    const chosen = candidates[0];
    const idx = G.enemyDrawPile.findIndex(c => c.id === chosen.id);
    G.enemyDrawPile.splice(idx,1);
    G.enemyDiscardPile.push(chosen);
    return chosen;
  }

  let scores={scissors:0,rock:0,paper:0};

  if(p==='aggressive'){
    G.enemyDrawPile.forEach(c=>{
      scores[c.type]+=(c.tier==='gold'?3:c.tier==='silver'?2:1)*(c.type==='rock'?1.3:1);
    });
  } else if(p==='counter'){
    const beats={paper:'scissors',scissors:'rock',rock:'paper'};
    Object.keys(prob).forEach(pt=>{ scores[beats[pt]]+=prob[pt]*2; });
    const avail={};
    G.enemyDrawPile.forEach(c=>{ avail[c.type]=(avail[c.type]||0)+1; });
    Object.keys(scores).forEach(t=>{ if(!avail[t]) scores[t]=0; });
  } else {
    const beats={paper:'scissors',scissors:'rock',rock:'paper'};
    Object.keys(prob).forEach(pt=>{
      scores[pt]        +=prob[pt]*1.0;
      scores[beats[pt]] +=prob[pt]*1.5;
    });
    const avail={};
    G.enemyDrawPile.forEach(c=>{ avail[c.type]=(avail[c.type]||0)+1; });
    Object.keys(scores).forEach(t=>{ if(!avail[t]) scores[t]=0; });
  }

  const bestType=Object.keys(scores).reduce((a,b)=>scores[a]>=scores[b]?a:b);
  let candidates=G.enemyDrawPile.filter(c=>c.type===bestType);
  if(!candidates.length) candidates=[G.enemyDrawPile[0]];
  if(p==='aggressive'){
    const to={gold:3,silver:2,normal:1};
    candidates.sort((a,b)=>to[b.tier]-to[a.tier]);
  }
  const chosen=candidates[0];
  const idx=G.enemyDrawPile.findIndex(c=>c.id===chosen.id);
  G.enemyDrawPile.splice(idx,1);
  G.enemyDiscardPile.push(chosen);
  return chosen;
}

/* ── 카드 내기 ── */
/* ── 카드 내기 (시간차 대결 연출 적용 버전) ── */
async function playCard(handIdx) {
  // ⛔ 진입 차단: 게임오버, 카드없음, 딜링중, 그리고 [전투 연출 중(isClashing)]일 때 차단
  if(G.isGameOver || !G.handDealt || G.dealAnimating || G.isClashing) return;
  if(G.usedInHand.includes(handIdx)) return;

  // 🔒 1단계 방어: 전투 연출 시작! 문을 잠급니다.
  G.isClashing = true;

  const pCard = G.hand[handIdx];
  const eCard = cpuPickCard();
  G.playerHistory.push(pCard.type);
  const res = judge(pCard.type, eCard.type);
  const overlay = $('clash-overlay');

  // 1. 연출 시작: 내 카드만 먼저 공개하고 적은 물음표로 표시
  $('p-clash').innerHTML = `<div class="card-icon" style="font-size:3rem">${CARD_TYPES[pCard.type].icon}</div><div class="card-dmg" style="font-size:1.5rem">${cardDmg(pCard)}</div>`;
  $('p-clash').className = `clash-card player-clash-card ${pCard.tier} ${pCard.type}`;
  
  $('e-clash').innerHTML = `<div class="card-icon" style="font-size:3rem">❓</div>`;
  $('e-clash').className = `clash-card enemy-clash-card`;
  
  $('clash-result-text').textContent = "상대의 선택은...?";
  $('clash-result-text').style.color = "var(--text)";
  overlay.classList.add('active');
  SFX.play();

  /* 2. 대기 시간 및 CPU 뜸 들이기 연출 */
  let dramaDelay = 1000; // 기본 대기 시간 1초

  /* 🎭 '신중 고민' 트리거 조건 — 결정적인 순간일수록 확률 ↑ (항상은 아님) */
  const eCardDmg = cardDmg(eCard);
  const pCardDmg = cardDmg(pCard);
  const isEnemyOneShotKill = eCardDmg >= G.playerHp;
  const isPlayerOneShotKill = pCardDmg >= G.enemyHp;
  const isCriticalMoment = isEnemyOneShotKill || isPlayerOneShotKill;
  const isLateGame = G.playerHp <= 5 || G.enemyHp <= 5;

  let triggerThinking = false;
  if(isCriticalMoment){
    // 한 방 킬 가능 상황: 60% 확률
    triggerThinking = Math.random() < 0.6;
  } else if(isLateGame){
    // 후반 위기: 25% 확률
    triggerThinking = Math.random() < 0.25;
  }

  if (triggerThinking) {
    dramaDelay = 2500; 
    $('clash-result-text').textContent = "상대가 신중하게 고민 중...";
    $('clash-result-text').style.color = "var(--accent)";
  }

  await new Promise(r => setTimeout(r, dramaDelay));

  /* 적 카드 공개 및 로그 상세 기록 */
  $('e-clash').innerHTML = `<div class="card-icon" style="font-size:3rem">${CARD_TYPES[eCard.type].icon}</div><div class="card-dmg" style="font-size:1.5rem">${cardDmg(eCard)}</div>`;
  $('e-clash').className = `clash-card enemy-clash-card ${eCard.tier} ${eCard.type}`;

  const detailMsg = `나: ${CARD_TYPES[pCard.type].icon}(${TIER[pCard.tier].label}) vs 적: ${CARD_TYPES[eCard.type].icon}(${TIER[eCard.tier].label})`;
  addLog(detailMsg, 'info');

  // 3. 다시 0.5초 대기 후 승패 결과 판정 및 연출
  await new Promise(r => setTimeout(r, 500));

  if (res === 'win') {
    $('p-clash').classList.add('winner');
    $('e-clash').classList.add('loser');
    $('clash-result-text').textContent = "WIN! 타격 성공!";
    $('clash-result-text').style.color = "var(--win)";
    SFX.win();
  } else if (res === 'lose') {
    $('p-clash').classList.add('loser');
    $('e-clash').classList.add('winner');
    $('clash-result-text').textContent = "LOSE! 데미지 입음!";
    $('clash-result-text').style.color = "var(--lose)";
    SFX.lose();
  } else {
    $('p-clash').classList.add('draw-card');
    $('e-clash').classList.add('draw-card');
    $('clash-result-text').textContent = "DRAW! 무승부";
    $('clash-result-text').style.color = "var(--draw)";
    SFX.drawSfx();
  }

  // 4. 연출 종료 및 실제 데이터 반영 (1.2초 후 오버레이 닫기)
  await new Promise(r => setTimeout(r, 1200));
  overlay.classList.remove('active');

  const appContainer = document.getElementById('app');

  // --- [통합 로직] 결과 판정 및 연출 처리 ---
  if (res === 'win') {
    const rawDmg = cardDmg(pCard); 
    const eShield = cardShield(eCard); 
    let finalDmg = Math.max(0, rawDmg - eShield); 
    
    G.enemyHp = Math.max(0, G.enemyHp - finalDmg);
    
    // 💥 타격 연출
    appContainer.classList.add('shake-light');
    setTimeout(() => appContainer.classList.remove('shake-light'), 300);
    
    if(eShield > 0) showDamagePopup('enemy', eShield, 'block');
    setTimeout(() => { if(finalDmg > 0) showDamagePopup('enemy', finalDmg, 'dmg'); }, eShield > 0 ? 300 : 0);
    
    addLog(`승리! ${eShield > 0 ? `적 실드 ${eShield} 감쇄 후 ` : ''}${finalDmg} 데미지!`, 'win');

    // ✂️ 캐릭터 패시브: 절단자
    if(G.character === 'barber' && pCard.type === 'scissors'){
      G.enemyHp = Math.max(0, G.enemyHp - 1);
      showSkillNotice('2차타', 'barber');
      setTimeout(() => showDamagePopup('enemy', 1, 'dmg'), 500);
      addLog(`✂️ 2차타 발동! 추가 1 데미지 (실드 무시)`, 'win');
    }
  } 
  else if (res === 'lose') {
    const rawDmg = cardDmg(eCard);
    const shield = cardShield(pCard);
    const finalDmg = Math.max(0, rawDmg - shield);
    G.playerHp = Math.max(0, G.playerHp - finalDmg);

    // 💥 피격 연출
    appContainer.classList.add('shake-hard');
    setTimeout(() => appContainer.classList.remove('shake-hard'), 400);

    if(shield > 0) showDamagePopup('player', shield, 'block');
    setTimeout(() => { if(finalDmg > 0) showDamagePopup('player', finalDmg, 'dmg'); }, shield > 0 ? 300 : 0);

    addLog(`패배! ${shield > 0 ? `실드 ${shield} 방어 후 ` : ''}${finalDmg} 피해!`, 'lose');

    // ⛏️ 캐릭터 패시브: 대리암 (방어 시 시각화)
    if(G.character === 'quarrier' && pCard.type === 'rock' && shield > 0){
      showSkillNotice('맷집', 'quarrier');
    }
  } 
  else {
    addLog(`무승부`, 'draw');
    // ⚖️ 캐릭터 패시브: 까로나
    if(G.character === 'karona'){
      G.playerHp += 1;
      G.playerMaxHp = Math.max(G.playerMaxHp, G.playerHp);
      showSkillNotice('무한 균형', 'karona');
      setTimeout(() => showDamagePopup('player', 1, 'heal'), 300);
      addLog(`⚖️ 무한 균형 발동! HP +1`, 'win');
    }
  }

  // 🧵 캐릭터 패시브: 색종이 (보 카드 사용 시 무조건 발동)
  if(G.character === 'tailor' && pCard.type === 'paper' && G.enemyHp > 0){
    G.enemyHp = Math.max(0, G.enemyHp - 1);
    showSkillNotice('종이에 베임', 'tailor');
    setTimeout(() => showDamagePopup('enemy', 1, 'dmg'), 600);
    addLog(`🧵 종이 의지 발동! 적에게 추가 1 데미지`, 'win');
  }

  // --- [턴 마무리 및 상태 갱신] 필수 로직 ---
  G.usedInHand.push(handIdx);
  
  // 🔒 2단계 방어: 체력이 0이 되는 순간 즉시 게임오버 상태로 만듭니다.
  if(G.enemyHp <= 0){ 
    G.isGameOver = true; // 💡 즉시 잠금!
    render(); 
    setTimeout(triggerStageClear, 500); 
    
    G.isClashing = false; // 안전을 위해 잠금 해제
    return; 
  }
  
  if(G.playerHp <= 0){ 
    G.isGameOver = true; // 💡 플레이어 사망 시에도 즉시 잠금!
    render(); 
    setTimeout(triggerGameOver, 500); 
    
    G.isClashing = false; 
    return; 
  }
  
  // 6장 모두 사용 시 패 리셋 준비
  if(G.usedInHand.length === 6) G.handDealt = false;
  
  // 🔓 모든 처리가 끝났으므로 다음 카드를 낼 수 있게 문을 엽니다.
  G.isClashing = false; 
  render();
}
  
// 데미지 팝업 띄우기 함수
// 데미지 팝업 최상단 레이어 띄우기 함수
function showDamagePopup(target, amount, type) {
  const block = document.getElementById(target + '-hp-block');
  if(!block) return;

  // 💡 상자의 현재 화면상 실제 좌표(Left, Top)를 계산합니다.
  const rect = block.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'dmg-popup';
  
  // 💡 위치 설정: 상자의 가로 중앙, 세로 상단 부근에 고정
  pop.style.left = (rect.left + rect.width / 2) + 'px';
  pop.style.top = (rect.top - 20) + 'px';

  if(type === 'heal') {
    pop.style.color = 'var(--win)';
    pop.innerText = '+' + amount;
  } else if(type === 'block') {
    pop.style.color = 'var(--shield)';
    pop.innerText = '🛡' + amount;
    pop.style.fontSize = '2.2rem';
  } else {
    pop.style.color = target === 'player' ? 'var(--danger)' : 'var(--accent)';
    pop.innerText = '-' + amount;
  }

  // 약간의 랜덤 X 위치값을 주어 여러 숫자가 겹치지 않게 함
  const offsetX = (Math.random() - 0.5) * 40;
  pop.style.marginLeft = `${offsetX}px`;

  // 💡 상자 내부가 아니라 document.body(최상위 레벨)에 직접 추가합니다.
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

// ✨ 스킬 발동 시각화 함수 (여기에 추가!)
function showSkillNotice(text, charClass) {
  const notice = document.createElement('div');
  notice.className = `skill-notice skill-${charClass}`;
  notice.innerText = '⚡ ' + text + ' ⚡';
  document.body.appendChild(notice);
  
  SFX.upgrade();
  
  setTimeout(() => notice.remove(), 1500);
}
  
function addLog(msg,type=''){
  G.log.unshift({msg,type});
  
  if(G.log.length>40) G.log.pop();
}
// 💡 스테이지 클리어 로직 수정 (최종 보스 클리어 시 시네마틱으로 연결)
function triggerStageClear(){
  gtag('event', 'stage_clear', { stage: G.stageIdx + 1 });
  G.isGameOver = true;
  SFX.stageClear();
  
  if(G.stageIdx < STAGES.length - 1){ 
    G.screen = 'reward'; 
    render(); 
  } else { 
    // 최종 보스를 이겼다면 시네마틱 렌더링 함수 호출!
    G.screen = 'ending_cinematic'; 
    renderEndingCinematic(); 
  }
}
</script>

function renderMapButton(){

  const shouldShow = !hiddenScreens.includes(G.screen);
  
  if(!btn){
    btn = document.createElement('button');
    btn.id = 'floating-map-btn';
    btn.title = '지도 보기';
    btn.innerHTML = '🗺️';
    btn.onclick = openMapModal;
    document.body.appendChild(btn);
  }
  btn.style.display = shouldShow ? 'flex' : 'none';
  
  // 모달 처리
  let modal = document.getElementById('map-modal');
  if(G.mapModalOpen){
    if(!modal){
      modal = document.createElement('div');
      modal.id = 'map-modal';
      document.body.appendChild(modal);
    }
    const cur = G.currentNodeId;
    modal.innerHTML = `
      <div class="map-modal-bg" onclick="closeMapModal()"></div>
      <div class="map-modal-panel">
        <div class="map-modal-head">

        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;font-size:.65rem;color:var(--text-dim);padding:0 10px 10px">
          <span><span style="color:#f04a6a">⚔️</span> 전투</span>
          <span><span style="color:#4af0c8">⛺</span> 휴게소</span>
          <span><span style="color:#b070ff">🌙</span> 뒷거래</span>
          <span><span style="color:#e8c84a">●</span> 현재</span>
        </div>
      </div>`;
    modal.style.display = 'flex';
    // 모달도 현재 위치로 스크롤
    setTimeout(() => {
      const body = document.getElementById('map-modal-scroll-body');
      if(!body) return;
      if(cur && MAP_NODES[cur]){
        const svgH = 1020;
        const ratio = (MAP_NODES[cur].y + 50) / svgH;
        body.scrollTop = Math.max(0, body.scrollHeight * ratio - body.clientHeight / 2);
      } else {
        // 시작 위치
        const targetSvgY = 980;
        const ratio = targetSvgY / 1020;
        body.scrollTop = Math.max(0, body.scrollHeight * ratio - body.clientHeight);
      }
    }, 0);
  } else if(modal){
    modal.style.display = 'none';
  }
}

function openMapModal(){ G.mapModalOpen = true; renderMapButton(); }
function closeMapModal(){ 
  G.mapModalOpen = false; 
  // 적 정보 팝업도 같이 닫기

}

/* ════════════════════════════════════════
   🗺️ MAP RENDER — 지도 화면 (대격변 v7.0)
   ════════════════════════════════════════ */

/* 노드 타입별 스타일 */
function nodeColor(type){
  return ({
    battle: '#f04a6a',
    rest:   '#4af0c8',
    deal:   '#b070ff',
    boss:   '#e8c84a'
  })[type] || '#7070a0';
}
function nodeIcon(node){
  if(node.type === 'boss') return '👹';
  if(node.type === 'rest') return '⛺';
  if(node.type === 'deal') return '🌙';
  // battle: 적 종류별 아이콘
  if(node.subBossKey === 'stage1')   return '😤';
  if(node.subBossKey === 'nalchigi') return '🏃';
  if(node.subBossKey === 'ssadagi')  return '✋';
  if(node.subBossKey === 'dolmeori') return '👊';
  if(node.subBossKey === 'scissors') return '✌️';
  if(node.stageIdx === 2) return '😎';
  if(node.stageIdx === 3) return '🃏';
  return '⚔️';
}
function nodeName(node){
  if(node.type === 'boss') return '문동진';
  if(node.type === 'rest') return '휴게소';
  if(node.type === 'deal') return '뒷거래';
  if(node.subBossKey === 'stage1')   return '양아치';
  if(node.subBossKey === 'nalchigi') return '날치기';
  if(node.subBossKey === 'ssadagi')  return '싸대기';
  if(node.subBossKey === 'dolmeori') return '돌머리';
  if(node.subBossKey === 'scissors') return '가위손';
  if(node.stageIdx === 2) return '두목';
  if(node.stageIdx === 3) return '사기꾼';
  return '???';
}

/* 🔍 적 노드의 정보 추출 (STAGES + BOSS_INTRO_DATA에서) */
function getEnemyInfoForNode(nodeId){
  const node = MAP_NODES[nodeId];
  if(!node) return null;
  const st = STAGES[node.stageIdx];
  if(!st) return null;
  
  const name = nodeName(node);
  const icon = nodeIcon(node);
  
  // subBoss가 있으면 그 데이터, 없으면 STAGES 자체
  let img = '';
  let hp = st.enemyHp;
  let deck = []; // [{type, tier}]
  let deckCount = 6;
  
  if(node.subBossKey){
    const sub = st.subBosses?.find(b => b.key === node.subBossKey);
    if(sub){
      // BOSS_INTRO_DATA 키와 일치
      img = (BOSS_INTRO_DATA[sub.key]?.img) || '';
      // sub.deck은 type만 있는 배열, tier는 'normal' (단 첫 카드만 sub.tier)
      deck = sub.deck.map((t, i) => ({
        type: t,
        tier: i === 0 ? (sub.tier || 'normal') : 'normal'
      }));
      deckCount = deck.length;
    }
  } else {
    // 비-서브보스 (STAGE 3, 4, 5): BOSS_INTRO_DATA에서 stage{n+1} 키
    img = (BOSS_INTRO_DATA[`stage${node.stageIdx + 1}`]?.img) || '';
    // 덱은 enemyDeckBuild()로 생성하지만, 매번 shuffle이므로 종류만 정적으로
    // 하지만 정확한 정적 정의가 없어서 임시로 placeholder
    if(node.stageIdx === 2){ // 두목
      deck = [
        {type:'scissors',tier:'silver'}, {type:'scissors',tier:'normal'},
        {type:'rock',    tier:'silver'}, {type:'rock',    tier:'normal'},
        {type:'paper',   tier:'silver'}, {type:'paper',   tier:'normal'}
      ];
    } else if(node.stageIdx === 3){ // 사기꾼
      deck = [
        {type:'scissors',tier:'silver'}, {type:'scissors',tier:'silver'},
        {type:'rock',    tier:'silver'}, {type:'rock',    tier:'silver'},
        {type:'paper',   tier:'normal'}, {type:'paper',   tier:'normal'}
      ];
    } else if(node.stageIdx === 4){ // 문동진
      deck = [
        {type:'scissors',tier:'gold'},   {type:'scissors',tier:'gold'},
        {type:'rock',    tier:'silver'}, {type:'rock',    tier:'silver'},
        {type:'paper',   tier:'normal'}, {type:'paper',   tier:'normal'}
      ];
    }
    deckCount = 6;
  }
  
  // 성향 풀
  let personalityPool = st.personalityPool || (st.fixedPersonality ? [st.fixedPersonality] : []);
  
  return { name, icon, img, hp, deck, deckCount, personalityPool };
}

/* 🔍 적 정보 팝업 — 열기/닫기 */
function openEnemyDetail(nodeId){
  G.enemyDetailNodeId = nodeId;
  renderEnemyDetailModal();
}
function closeEnemyDetail(){
  G.enemyDetailNodeId = null;
  const modal = document.getElementById('enemy-detail-modal');
  if(modal) modal.remove();
}

/* 🔍 적 정보 팝업 렌더링 */
function renderEnemyDetailModal(){
  const nodeId = G.enemyDetailNodeId;
  if(!nodeId) return;
  const info = getEnemyInfoForNode(nodeId);
  if(!info) return;
  
  const seen = G.seenEnemies.includes(nodeId);
  
  // 덱 표시 - seen이면 실제 덱, 아니면 ❓
  let deckHTML;
  if(seen){
    deckHTML = info.deck.map(c => {
      const ct = CARD_TYPES[c.type];
      const shd = cardShield(c);
      return `<div class="pip ${c.type} tier-${c.tier}" style="cursor:default">
        <div class="pip-icon">${ct.icon}</div>
        <div class="pip-label">${c.type.slice(0,3).toUpperCase()}</div>
        <div class="pip-dmg">${cardDmg(c)}</div>
        ${shd>0?`<div class="pip-shield">🛡${shd}</div>`:''}
      </div>`;
    }).join('');
  } else {
    // 처음 만나는 적: ❓ x 개수만 (A + B 혼재)
    deckHTML = Array(info.deckCount).fill(0).map(() => `
      <div class="pip" style="background:#1a1a1a;border:2px dashed #444;cursor:default;display:flex;align-items:center;justify-content:center">
        <div class="pip-icon" style="font-size:1.6rem;color:#666">❓</div>
      </div>
    `).join('');
  }
  
  // 성향 뱃지들
  const personalityBadges = info.personalityPool.map(pkey => {
    const p = PERSONALITIES.find(pp => pp.key === pkey);
    if(!p) return '';
    return `<span class="personality-badge ${p.badgeClass}" style="font-size:.65rem;margin:2px">${p.icon} ${p.label}</span>`;
  }).join('');
  
  // 메시지 (A+B 혼재)
  const seenMsg = seen
    ? `<div style="font-size:.7rem;color:var(--win);text-align:center;margin-top:8px;font-weight:700">✓ 한 번 만나본 적</div>`
    : `<div style="font-size:.72rem;color:var(--accent);text-align:center;margin-top:8px;line-height:1.5;background:rgba(232,200,74,.06);padding:8px;border-radius:8px;border:1px dashed var(--accent)">
        🌫️ 처음 만나는 적입니다<br>
        <span style="font-size:.65rem;color:var(--text-dim)">한 번 싸워봐야 덱이 공개됩니다</span>
      </div>`;
  
  // ⚔️ 진입 가능 여부: map_select 화면에서 pendingNextOptions에 있을 때만
  const isEnterable = G.screen === 'map_select' && (G.pendingNextOptions || []).includes(nodeId);
  const enterBtn = isEnterable
    ? `<button class="btn btn-primary" onclick="confirmEnterEnemy('${nodeId}')" style="width:100%;margin-top:14px">⚔️ 이 적과 대결하기</button>`
    : '';
  
  // 모달 생성/갱신
  let modal = document.getElementById('enemy-detail-modal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'enemy-detail-modal';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="enemy-detail-bg" onclick="closeEnemyDetail()"></div>
    <div class="enemy-detail-panel">
      <div class="enemy-detail-head">
        <span style="font-family:'Black Han Sans',sans-serif;color:var(--danger);letter-spacing:1px">🔍 적 정보</span>
        <button class="map-modal-close" onclick="closeEnemyDetail()">✕</button>
      </div>
      <div class="enemy-detail-body">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
          <div class="enemy-detail-img" style="background-image:url('${info.img}')"></div>
          <div style="flex:1">
            <div style="font-family:'Black Han Sans',sans-serif;font-size:1.2rem;color:var(--text)">${info.icon} ${info.name}</div>
            <div style="font-size:.72rem;color:var(--text-dim);margin-top:4px">HP ${info.hp}</div>
          </div>
        </div>
        
        <div style="font-size:.7rem;color:var(--text-dim);margin-bottom:6px;letter-spacing:1px">🎴 덱 (${info.deckCount}장)</div>
        <div class="pip-row" style="justify-content:center;gap:5px;flex-wrap:wrap">${deckHTML}</div>
        ${seenMsg}
        
        <div style="margin-top:14px">
          <div style="font-size:.7rem;color:var(--text-dim);margin-bottom:6px;letter-spacing:1px">🧠 성향 (이 중 하나로 등장)</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center">${personalityBadges}</div>
        </div>
        
        ${enterBtn}
      </div>
    </div>`;
  modal.style.display = 'flex';
}

/* ⚔️ 적 정보 팝업에서 "이 적과 대결" 버튼 클릭 시 */
function confirmEnterEnemy(nodeId){
  closeEnemyDetail();
  selectNextNode(nodeId);
}

/* SVG 지도 마크업 생성 — 인라인용 */
function buildMapSVG({ interactive = false, currentNodeId = null, visited = [], nextOptions = [], clickableEnemies = false } = {}){
  const W = 380, H = 1020;  // 940 → 1020 (하단 80px 여백 추가)
  const visitedSet = new Set(visited);
  const nextSet = new Set(nextOptions);
  
  // 🗺️ "지나온 노드" 판정: visited에 들어간 노드 ID들
  // "지나온 길(연결선)"은 from이 visited면 흑백 처리
  
  // 연결선
  let lines = '';
  Object.entries(MAP_NODES).forEach(([id, n]) => {
    n.next.forEach(nextId => {
      const t = MAP_NODES[nextId];
      if(!t) return;
      // 좌표 그대로 사용 (위=문동진, 아래=START)
      const y1 = n.y + 50, y2 = t.y + 50;  // +50: 상단 여백
      // from이 visited이면 흑백 (지나온 길)
      // 현재 위치의 Y좌표를 기준으로 더 뒤에 있는 선인지 판단 (높은 Y가 하단/과거)
      const curY = currentNodeId ? MAP_NODES[currentNodeId].y : 1000;
      const isPastEdge = (n.y > curY) || (id !== currentNodeId && n.y === curY);
      const color = isPastEdge ? '#3a3a3a' : '#5a5a7a';
      const op = isPastEdge ? '.4' : '1';
      lines += `<line x1="${n.x}" y1="${y1}" x2="${t.x}" y2="${y2}" stroke="${color}" stroke-width="2" stroke-dasharray="5,4" opacity="${op}"/>`;
    });
  });
  
  // 노드들
  let nodes = '';
  Object.entries(MAP_NODES).forEach(([id, n]) => {
    const y = n.y + 50;  // +50: 상단 여백
    const baseColor = nodeColor(n.type);
    
    // 💡 변경 핵심: 다음 갈 길을 고르는 중(map_select)이라면 현재 서있는 곳도 '볼일 끝난 과거'로 취급하여 하이라이트를 끕니다.
    const isCurrent = (id === currentNodeId) && (G.screen !== 'map_select');
    
    const isNext = nextSet.has(id);
    const isBoss = n.type === 'boss';
    const isVisited = visitedSet.has(id); // 아래 클릭 이벤트 등에서 쓸 수 있으니 유지

    // 현재 층(Y)보다 뒤에 있거나, 같은 층인데 내가 아닌 노드(날라리 등)는 과거로 판정
    const curY = currentNodeId ? MAP_NODES[currentNodeId].y : 1000;
    const isPastNode = (n.y > curY) || (!isCurrent && n.y === curY);

    // 과거 노드는 흑백('#5a5a5a') 처리
    const color = isPastNode ? '#5a5a5a' : baseColor;
    const textColor = isPastNode ? '#888' : (isBoss ? '#ffd060' : (n.type === 'battle' ? '#ff8080' : baseColor));
    const labelColor = isPastNode ? '#666' : baseColor;

    const w = isBoss ? 100 : 80;
    const h = isBoss ? 50 : 44;
    const x = n.x - w/2;
    const ny = y - h/2;
    
    // opacity 중복 선언 해결 및 로직 통합
    let opacity = '1';
    let strokeWidth = '2';
    let extraGlow = '';
    
    // 완전한 과거 노드이면 0.4, (과거는 아니지만) 지나온 노드면 0.5로 설정
    if(isPastNode) { 
      opacity = '.4'; 
    } else if(isVisited && !isCurrent) { 
      opacity = '.5'; 
    }
    if(isCurrent){ strokeWidth = '3'; extraGlow = `<rect x="${x-3}" y="${ny-3}" width="${w+6}" height="${h+6}" rx="13" fill="none" stroke="${baseColor}" stroke-width="2" opacity=".5"><animate attributeName="opacity" values=".2;.7;.2" dur="1.5s" repeatCount="indefinite"/></rect>`; }
    if(isNext){ extraGlow = `<rect x="${x-2}" y="${ny-2}" width="${w+4}" height="${h+4}" rx="12" fill="none" stroke="${baseColor}" stroke-width="1.5" opacity=".7"><animate attributeName="opacity" values=".4;1;.4" dur="1.2s" repeatCount="indefinite"/></rect>`; }
    
    // 클릭 핸들러 우선순위:
    // 1) clickableEnemies + battle/boss → 적 정보 팝업 (진입 가능 여부와 무관)
    // 2) interactive + isNext + 휴게소/뒷거래 → 노드 진입 (정보 볼 게 없으니 바로 진입)
    let clickAttr = '';
    let groupClass = '';
    if(clickableEnemies && (n.type === 'battle' || n.type === 'boss')){
      clickAttr = `onclick="openEnemyDetail('${id}')" style="cursor:pointer"`;
      groupClass = 'map-node-info';
    } else if(interactive && isNext){
      clickAttr = `onclick="selectNextNode('${id}')" style="cursor:pointer"`;
      groupClass = 'map-node-clickable';
    }
    
    // 🗺️ 폰트 변경: Black Han Sans → Noto Sans (가독성)
    const titleFont = "'Noto Sans KR', sans-serif";
    const labelFont = "'Orbitron', sans-serif";
    
    nodes += `<g class="${groupClass}" ${clickAttr} opacity="${opacity}">${extraGlow}
      <rect x="${x}" y="${ny}" width="${w}" height="${h}" rx="10"
            fill="${(isVisited && !isCurrent) ? '#1a1a1a' : (isBoss?'#1e1608':n.type==='rest'?'#0a1a12':n.type==='deal'?'#160f22':'#1e0a10')}"
            stroke="${color}" stroke-width="${strokeWidth}"/>
      <rect x="${x}" y="${ny}" width="${w}" height="${h}" rx="10" fill="${color}" opacity=".05"/>
      ${isBoss ? `<text x="${n.x}" y="${ny+18}" text-anchor="middle" font-family="${labelFont}" font-size="8" fill="${labelColor}" letter-spacing="1.5">FINAL STAGE</text>
                  <text x="${n.x}" y="${ny+38}" text-anchor="middle" font-family="${titleFont}" font-weight="700" font-size="13" fill="${textColor}">${nodeIcon(n)} ${nodeName(n)}</text>`
                : n.type === 'battle' ? `<text x="${n.x}" y="${ny+17}" text-anchor="middle" font-family="${labelFont}" font-size="7.5" fill="${labelColor}" letter-spacing="1">${n.label}</text>
                                          <text x="${n.x}" y="${ny+34}" text-anchor="middle" font-family="${titleFont}" font-weight="700" font-size="11" fill="${textColor}">${nodeIcon(n)} ${nodeName(n)}</text>`
                : `<text x="${n.x}" y="${ny+19}" text-anchor="middle" font-size="13">${nodeIcon(n)}</text>
                   <text x="${n.x}" y="${ny+36}" text-anchor="middle" font-family="${titleFont}" font-weight="700" font-size="11" fill="${textColor}">${nodeName(n)}</text>`
      }
    </g>`;
  });
  
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
    <defs>
      <radialGradient id="mapBgGrad" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#1a1a2e"/>
        <stop offset="100%" stop-color="#0d0d14"/>
      </radialGradient>
      <pattern id="mapDots" width="6" height="6" patternUnits="userSpaceOnUse">
        <circle cx="3" cy="3" r=".8" fill="#2a2a42"/>
      </pattern>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#mapBgGrad)" rx="14"/>
    <rect width="${W}" height="${H}" fill="url(#mapDots)" rx="14" opacity=".5"/>
    ${lines}
    ${nodes}
    <text x="190" y="${H-50}" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-weight="700" font-size="13" fill="#e8c84a" letter-spacing="3">▲ 시작 ▲</text>
    <text x="190" y="${H-28}" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="9" fill="#888" letter-spacing="1">위로 스크롤하여 전체 경로 확인</text>
  </svg>`;
}

/* 🗺️ 지도 컨테이너의 스크롤 위치 조정 헬퍼 */
function scrollMapToBottom(){
  // 페인트 후 실행 (DOM이 준비된 다음)
  setTimeout(() => {
    const c = document.getElementById('map-scroll-container');
    if(!c) return;
    // STAGE 1 노드(y=880, +50 오프셋 = 930)가 화면 하단에서 약 80px 위에 보이도록
    // SVG 높이 1020 기준, scrollHeight도 그 비율
    // 컨테이너 viewport bottom이 SVG 좌표 ~960 위치를 가리키게
    const targetSvgY = 980; // STAGE 1보다 살짝 아래
    const ratio = targetSvgY / 1020;
    const targetTop = c.scrollHeight * ratio - c.clientHeight;
    c.scrollTop = Math.max(0, targetTop);
  }, 0);
}
function scrollMapToCurrent(){
  setTimeout(() => {
    const c = document.getElementById('map-scroll-container');
    if(!c) return;
    const cur = G.currentNodeId ? MAP_NODES[G.currentNodeId] : null;
    if(!cur){ scrollMapToBottom(); return; }
    const svgH = 1020;
    const ratio = (cur.y + 50) / svgH;
    const targetTop = c.scrollHeight * ratio - c.clientHeight / 2;
    c.scrollTop = Math.max(0, targetTop);
  }, 0);
}

/* 사용자가 노드 클릭 → 진입 */
function selectNextNode(nodeId){
  if(!G.pendingNextOptions || !G.pendingNextOptions.includes(nodeId)) return;
  enterNode(nodeId);
}

/* 노드 진입 — 타입에 따라 적절한 화면으로 */
function enterNode(nodeId){
  const node = MAP_NODES[nodeId];
  if(!node) return;
  
  // 이전 노드를 visited에 추가
  if(G.currentNodeId && !G.visitedNodes.includes(G.currentNodeId)){
    G.visitedNodes.push(G.currentNodeId);
  }
  G.currentNodeId = nodeId;
  G.pendingNextOptions = null;
  
  if(node.type === 'battle' || node.type === 'boss'){
    // 🗺️ 만나본 적 기록 (브라우저 세션 동안 유지)
    if(!G.seenEnemies.includes(nodeId)){
      G.seenEnemies.push(nodeId);
      saveSeenEnemies();
    }
    // 매 전투마다 로그는 기본 접힘
    G.logFolded = true;
    // 첫 1스테이지 진입은 hpOverride=null (기본 HP 적용), 그 이후는 G.playerHp 유지
    const isFirstStage = !G.visitedNodes.some(id => {
      const n = MAP_NODES[id];
      return n && (n.type === 'battle' || n.type === 'boss');
    });
    initStage(node.stageIdx, isFirstStage ? null : G.playerHp);
    if(node.type === 'boss') BGM.playBoss(); else BGM.playBattle();
    G.screen = 'boss_intro';
    render();
  } else if(node.type === 'rest'){
    G.screen = 'reststop';
    BGM.playRest();
    render();
  } else if(node.type === 'deal'){
    G.dealCards = [];
    G.dealPickIdx = null;
    G.dealReplaceIdx = null;
    G.dealStep = 'intro';
    G.screen = 'deal';
    BGM.playDeal();
    SFX.deal();
    render();
  }
}

/* ── [카드 받기] 버튼 ──
   6장 오픈 핸드: 0.18초 간격으로 6장 순차 딜 애니메이션
   ★ render()를 여기서 다시 부르지 않음 → 충돌 없음
*/
function handleDrawBtn(){
  // ★ 새 라운드 시작: 적 덱도 완전 리셋 → 적 남은 패 즉시 풀패로 표시
  G.enemyDrawPile    = shuffle([...G.enemyDeck]);
  G.enemyDiscardPile = [];

  drawPlayerHand();        // G.hand 6장 업데이트
  G.handDealt=false;
  G.dealAnimating=true;

  const btn=$('draw-btn');
  if(btn) btn.disabled=true;

  const handArea=$('hand-area');
  if(handArea) handArea.innerHTML='<div class="card card-placeholder"></div>'.repeat(6);

  G.hand.forEach((c,i)=>{
    setTimeout(()=>{
      SFX.draw();
      const ct=CARD_TYPES[c.type];
      const div=document.createElement('div');
      div.className=`card ${c.type} tier-${c.tier} dealing`;
      div.style.animationDuration='.38s';
      div.innerHTML=`
        <div class="card-icon">${ct.icon}</div>
        <div class="card-name">${ct.label}</div>
        <div class="card-dmg">${cardDmg(c)} DMG</div>`;
      div.onclick=()=>playCard(i);

      const slots=handArea.querySelectorAll('.card-placeholder');
      if(slots[0]) slots[0].replaceWith(div);
      else handArea.appendChild(div);

    if(i===G.hand.length-1){
        setTimeout(()=>{
          G.handDealt=true;
          G.dealAnimating=false;
          div.classList.remove('dealing');
          render();
        }, 400);
      }
    }, i*180); // 0.18초 간격 (6장이라 더 빠르게)
  });
}
