<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>S-R-P Battle v1</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0d1117;
  --panel: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --accent: #58a6ff;
  --accent2: #f85149;
  --hp-bg: #21262d;
  --hp-fill: #2ea043;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
body {
  margin: 0; padding: 0; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  overflow: hidden; position: fixed; width: 100%; height: 100%; overscroll-behavior: none;
}

#app {
  display: flex; flex-direction: column; width: 100%;
  height: calc(100dvh - var(--safe-top) - var(--safe-bottom));
  margin-top: var(--safe-top); margin-bottom: var(--safe-bottom);
}

button {
  background: var(--panel); border: 1px solid var(--border); color: var(--text);
  padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 1rem;
}
button:active { background: #1f242c; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* --- 기존 UI 스타일 유지 --- */
.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; padding: 15px; }
.screen.active { display: flex; }

.title-screen { justify-content: center; align-items: center; text-align: center; }
.main-title { font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
.version { font-size: 0.8rem; opacity: 0.5; margin-bottom: 30px; }

/* --- 보스 인트로 스타일 (추가됨) --- */
.intro-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
.boss-image {
  width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--border);
  box-shadow: 0 0 20px rgba(0,0,0,0.5); margin-bottom: 20px; background-size: cover; background-position: center;
}
.boss-intro-text { font-size: 1.2rem; font-style: italic; color: var(--accent2); margin-bottom: 30px; max-width: 80%; line-height: 1.5; }

/* --- 배틀 영역 스타일 (HP 바 수정됨) --- */
.battle-area { flex: 1; display: grid; grid-template-rows: auto 1fr auto; gap: 10px; overflow: hidden; }
.hp-area { display: flex; flex-direction: column; gap: 10px; background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
.hp-row { display: grid; grid-template-columns: 80px 1fr 50px; align-items: center; gap: 10px; }
.name { font-size: 0.9rem; opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* --- 개선된 HP 바 CSS (상대적 길이 적용) --- */
.hp-track {
  height: 12px; background: var(--hp-bg); border-radius: 6px; overflow: hidden; position: relative;
  /* 핵심: HP 1점당 15px 너비를 가집니다. (자바스크립트에서 --max-w 설정) */
  width: var(--max-w, 100%); 
  min-width: 60px; /* 너무 작아지지 않게 최소값 */
}
.hp-bar { height: 100%; background: var(--hp-fill); width: 100%; transition: width 0.3s ease; }
.hp-num { font-size: 0.8rem; text-align: right; opacity: 0.7; }

/* --- 기존 중간 영역, 로그, 핸드, 보상/휴게소 스타일 유지 --- */
.middle-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow: hidden; }
.tracker-panel { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; font-size: 0.85rem; }
.tracker-header { opacity: 0.6; margin-bottom: 5px; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 3px; }
.tracker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
.tracker-card { text-align: center; border: 1px solid transparent; border-radius: 4px; padding: 2px 0; }
.tracker-card.played { opacity: 0.3; border-color: var(--border); }
.log-area { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid var(--border); overflow-y: auto; font-size: 0.85rem; display: flex; flex-direction: column-reverse; }
.log-entry { margin-bottom: 4px; line-height: 1.3; }

.hand-area { background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
.hand-header { display: flex; justify-content: space-between; align-items: center; opacity: 0.7; font-size: 0.9rem; }
.cards-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.card-btn {
  background: #1f242c; border: 2px solid var(--border); border-radius: 8px; padding: 15px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.2s;
}
.card-btn:active { transform: scale(0.95); background: #262c36; }
.card-btn.silver { border-color: #c0c0c0; color: #fff; }
.card-btn.gold { border-color: #ffd700; color: #fff; }
.card-icon { font-size: 2rem; }
.card-dmg { font-size: 0.8rem; opacity: 0.7; }

.reward-screen, .rest-screen { justify-content: center; align-items: center; text-align: center; }
.reward-header, .rest-header { font-size: 1.5rem; color: var(--accent); margin-bottom: 20px; }
.rest-options { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 300px; }
.rest-btn {
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px;
  display: flex; flex-direction: column; gap: 8px; cursor: pointer; transition: 0.2s;
}
.rest-btn:active { background: #1f242c; }
.rest-title { font-size: 1.2rem; color: #fff; }
.rest-desc { font-size: 0.9rem; opacity: 0.7; }

/* --- 가로 모드 대응 유지 --- */
@media (orientation: landscape) {
  .battle-area { grid-template-rows: 1fr; grid-template-columns: 2fr 1fr; gap: 15px; }
  .hp-area { grid-column: 2; grid-row: 1; justify-content: center; }
  .middle-area { grid-column: 1; grid-row: 1; }
  .hand-area { display: none; }
}
</style>
</head>
<body>
<div id="app">
  <div id="screen-title" class="screen title-screen active">
    <div class="main-title">가위 바위 보 배틀</div>
    <div class="version">v1.0 by 카로나 & 제미나이</div>
    <button onclick="startGame()">게임 시작</button>
  </div>

  <div id="screen-main" class="screen">
    <div class="battle-area">
      <div id="hp-area" class="hp-area"></div>

      <div id="middle-area" class="middle-area"></div>
      
      <div id="intro-area" class="intro-area" style="display:none;"></div>

      <div id="hand-area" class="hand-area"></div>
    </div>
  </div>

  <div id="screen-reward" class="screen reward-screen">
    <div class="reward-header">전투 승리!</div>
    <div style="margin-bottom: 20px; opacity: 0.7;">덱의 카드 1장이 SILVER(공격력 5)로 강화됩니다.</div>
    <div style="margin-bottom: 30px; font-size: 1.2rem; color: #fff;">어떤 카드를 강화하시겠습니까?</div>
    <div id="reward-cards" class="cards-container" style="max-width: 400px; width: 100%;"></div>
  </div>

  <div id="screen-rest" class="screen rest-screen">
    <div class="rest-header">☕ 휴게소 (Stage <span id="rest-stage-num"></span>)</div>
    <div class="rest-options">
      <div class="rest-btn" onclick="selectRest('bacchus')">
        <div class="rest-title">🥤 박카스</div>
        <div class="rest-desc">체력을 3 회복합니다. (최대 체력 초과 불가)</div>
      </div>
      <div id="btn-rest-upgrade" class="rest-btn" onclick="selectRest('upgrade')">
        <div class="rest-title">⚡ 카드 강화</div>
        <div class="rest-desc">덱의 노멀 카드를 SILVER(공격력 5)로 강화합니다.</div>
      </div>
    </div>
  </div>
</div>

<script>
// --- 기존 사운드 및 WakeLock 로직 유지 ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = AudioContext ? new AudioContext() : null;

function createOscillator(freq, duration, type = 'sine', gainVal = 0.1) {
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(gainVal, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + duration);
}

const sounds = {
  card_draw: () => { createOscillator(800, 0.1, 'sine', 0.05); setTimeout(()=>createOscillator(1000, 0.1, 'sine', 0.05), 50); },
  card_play: () => createOscillator(400, 0.1, 'triangle', 0.1),
  clash_draw: () => { createOscillator(300, 0.2, 'square', 0.05); createOscillator(305, 0.2, 'square', 0.05); },
  clash_win: () => { createOscillator(600, 0.1, 'triangle', 0.1); setTimeout(()=>createOscillator(800, 0.1, 'triangle', 0.1), 50); },
  clash_lose: () => createOscillator(200, 0.3, 'sawtooth', 0.1),
  stage_win: () => { const f=[523.25, 659.25, 783.99]; f.forEach((freq,i)=>setTimeout(()=>createOscillator(freq,0.2), i*150)); },
  game_over: () => { const f=[392, 349.23, 329.63, 261.63]; f.forEach((freq,i)=>setTimeout(()=>createOscillator(freq,0.3, 'sawtooth'), i*200)); },
  rest: () => { createOscillator(440, 0.2, 'sine', 0.1); setTimeout(()=>createOscillator(660, 0.4, 'sine', 0.1), 150); }
};

if (window.Telegram && Telegram.WebApp) {
  const twa = Telegram.WebApp; twa.ready(); twa.expand();
  if (twa.headerColor) twa.setHeaderColor('bg_color');
}

let wakeLock = null;
const requestWakeLock = async () => {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
};
if ('wakeLock' in navigator) { requestWakeLock(); document.addEventListener('visibilitychange', () => { if (wakeLock !== null && document.visibilitychange === 'visible') requestWakeLock(); }); }

// --- 데이터 및 게임 로직 유지 (스테이지 이름 및 에셋 추가) ---

// 타일 렌더링 함수
const types = { scissors: '✌️', rock: '✊', paper: '🖐️' };
const tiers = { normal: { name: 'N', dmg: 3, cls: '' }, silver: { name: 'S', dmg: 5, cls: 'silver' }, gold: { name: 'G', dmg: 7, cls: 'gold' } };

// 인휴 님 요청 대사
const dialogues = [
  "길거리 양아치 정도야 껌이겠지",           // Stage 1
  "양아치를 쓰러뜨렸더니 조폭 두목이 나타났네", // Stage 2
  "뭐야 이동네 오야봉 문동진?"              // Stage 3
];

// 에셋 파일 이름
const bossImages = [
  "stage1.jpg", // 양아치
  "stage2.jpg", // 두목
  "stage3.jpg"  // 문동진
];

const STAGES = [
  { name: 'Stage 1: 양아치', maxHp: 5, normal: 2, silver: 0, gold: 0, reward: 'normal' },
  { name: 'Stage 2: 두목', maxHp: 7, normal: 2, silver: 1, gold: 0, reward: 'silver' },
  { name: 'Stage 3: 문동진', maxHp: 15, normal: 2, silver: 0, gold: 2, reward: 'gold' }
];

function createInitialDeck() {
  const d = [];
  ['scissors', 'rock', 'paper'].forEach(type => { for(let i=0; i<2; i++) d.push({ id: Date.now()+Math.random(), type, tier: 'normal' }); });
  return d;
}

// 게임 상태 (showIntro 추가됨)
let G = { stageIdx: 0, playerHp: 10, playerMaxHp: 10, enemyHp: 0, enemyMaxHp: 0, playerDeck: [], playerHand: [], playerDiscard: [], enemyDeck: [], enemyDiscard: [], battleLog: [], showIntro: false };

function startGame() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  G.playerHp = 10; G.playerMaxHp = 10; G.playerDeck = createInitialDeck(); G.stageIdx = 0;
  showScreen('screen-main'); startBattle(0);
}

function startBattle(idx) {
  const s = STAGES[idx]; G.stageIdx = idx; G.enemyHp = s.maxHp; G.enemyMaxHp = s.maxHp;
  G.enemyDeck = [];
  ['scissors', 'rock', 'paper'].forEach(type => {
    for(let i=0; i<s.normal; i++) G.enemyDeck.push({ type, tier: 'normal' });
    for(let i=0; i<s.silver; i++) G.enemyDeck.push({ type, tier: 'silver' });
    for(let i=0; i<s.gold; i++) G.enemyDeck.push({ type, tier: 'gold' });
  });
  G.enemyDiscard = []; shuffle(G.enemyDeck); G.playerDiscard = []; G.playerHand = []; shuffle(G.playerDeck);
  G.battleLog = [{ type: 'system', text: `⚔️ [${s.name}]과의 전투가 시작되었습니다!` }];
  
  G.showIntro = true; // 보스 인트로 보여주기 설정
  renderMain();
}

function drawInitialHand() {
  for(let i=0; i<3; i++) drawCard(); sounds.card_draw(); G.battleLog.push({ type: 'system', text: '🎴 카드를 3장 뽑았습니다.' });
}

function drawCard() {
  if (G.playerDeck.length === 0) {
    if (G.playerDiscard.length === 0) return;
    G.playerDeck = G.playerDiscard; G.playerDiscard = []; shuffle(G.playerDeck); G.battleLog.push({ type: 'system', text: '🔄 플레이어 덱을 다시 섞었습니다.' });
  }
  if (G.playerHand.length < 3) G.playerHand.push(G.playerDeck.pop());
}

function playCard(cardId) {
  const idx = G.playerHand.findIndex(c => c.id === cardId); if (idx === -1) return;
  const pCard = G.playerHand.splice(idx, 1)[0]; G.playerDiscard.push(pCard);
  
  if (G.enemyDeck.length === 0) { G.enemyDeck = G.enemyDiscard; G.enemyDiscard = []; shuffle(G.enemyDeck); G.battleLog.push({ type: 'system', text: '🔄 적 덱을 다시 섞었습니다.' }); }
  const eCard = G.enemyDeck.pop(); G.enemyDiscard.push(eCard);
  
  sounds.card_play(); let text = `플레이어: ${types[pCard.type]}(${tiers[pCard.tier].name}) vs 적: ${types[eCard.type]}(${tiers[eCard.tier].name}) -> `;
  const res = judge(pCard.type, eCard.type);
  
  if (res === 0) { text += '🤝 비겼습니다.'; sounds.clash_draw(); }
  else if (res === 1) { const dmg = tiers[pCard.tier].dmg; G.enemyHp = Math.max(0, G.enemyHp - dmg); text += `✅ 승리! 적에게 ${dmg} 데미지.`; sounds.clash_win(); }
  else { const dmg = tiers[eCard.tier].dmg; G.playerHp = Math.max(0, G.playerHp - dmg); text += `❌ 패배. ${dmg} 데미지를 입었습니다.`; sounds.clash_lose(); }
  
  G.battleLog.push({ type: 'result', text }); drawCard(); checkBattleEnd(); renderMain();
}

function judge(p, e) { if (p === e) return 0; if ((p === 'scissors' && e === 'paper') || (p === 'rock' && e === 'scissors') || (p === 'paper' && e === 'rock')) return 1; return -1; }

function checkBattleEnd() {
  if (G.enemyHp <= 0) { sounds.stage_win(); G.stageIdx++; if (G.stageIdx >= STAGES.length) { twa.showAlert('🎊 축하합니다! 모든 오야봉을 꺾고 동네를 제패했습니다!'); showScreen('screen-title'); } else { showScreen('screen-reward'); renderReward(); } }
  else if (G.playerHp <= 0) { sounds.game_over(); twa.showAlert('💀 패배했습니다... 다시 도전하세요.'); showScreen('screen-title'); }
}

function startRewardUpgrade(cardId) {
  const card = G.playerDeck.find(c => c.id === cardId); if(!card) return;
  const currentTier = card.tier; card.tier = currentTier === 'normal' ? 'silver' : 'gold';
  G.battleLog.push({ type: 'system', text: `✨ 덱의 ${types[card.type]} 카드가 ${tiers[card.tier].name}로 강화되었습니다!` });
  sounds.rest(); showScreen('screen-rest'); renderRest();
}

function renderReward() {
  const s = STAGES[G.stageIdx-1]; // 직전 스테이지 정보
  const container = document.getElementById('reward-cards'); container.innerHTML = '';
  // 노멀->실버 or 실버->골드 강화 대상 카드 필터링
  const upgradableCards = G.playerDeck.filter(c => c.tier === s.reward);
  
  if (upgradableCards.length === 0) {
    container.innerHTML = '<div style="opacity:0.6;">강화할 수 있는 카드가 없습니다.</div>';
    setTimeout(() => { showScreen('screen-rest'); renderRest(); }, 1500); // 1.5초 후 휴게소로
    return;
  }
  
  upgradableCards.forEach(card => {
    const btn = document.createElement('div'); btn.className = `card-btn ${tiers[card.tier].cls}`;
    btn.onclick = () => startRewardUpgrade(card.id);
    btn.innerHTML = `<div class="card-icon">${types[card.type]}</div><div class="card-dmg">${tiers[card.tier].name}/${tiers[card.tier].dmg}</div>`;
    container.appendChild(btn);
  });
}

function renderRest() {
  document.getElementById('rest-stage-num').textContent = G.stageIdx;
  const upBtn = document.getElementById('btn-rest-upgrade');
  // 덱에 노멀 카드가 있을 때만 강화 버튼 활성화
  const hasNormal = G.playerDeck.some(c => c.tier === 'normal');
  upBtn.style.opacity = hasNormal ? '1' : '0.4';
  upBtn.onclick = hasNormal ? () => selectRest('upgrade') : null;
}

function selectRest(type) {
  sounds.rest();
  if (type === 'bacchus') { G.playerHp = Math.min(G.playerMaxHp, G.playerHp + 3); G.battleLog.push({ type: 'system', text: '🥤 박카스를 마셔 체력을 3 회복했습니다.' }); }
  else if (type === 'upgrade') {
    const normalCards = G.playerDeck.filter(c => c.tier === 'normal');
    if (normalCards.length > 0) { shuffle(normalCards); normalCards[0].tier = 'silver'; G.battleLog.push({ type: 'system', text: `✨ 휴게소 강화: 덱의 ${types[normalCards[0].type]} 카드가 SILVER로 변했습니다.` }); }
  }
  showScreen('screen-main'); startBattle(G.stageIdx);
}

// --- 렌더링 로직 (수정됨) ---

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// 메인 화면 렌더링 (인트로 또는 배틀)
function renderMain() {
  const introArea = document.getElementById('intro-area');
  const middleArea = document.getElementById('middle-area');
  const handArea = document.getElementById('hand-area');
  
  if (G.showIntro) {
    // 인트로 보여주기
    introArea.style.display = 'flex'; middleArea.style.display = 'none'; handArea.style.display = 'none';
    renderBossIntro();
  } else {
    // 배틀 보여주기
    introArea.style.display = 'none'; middleArea.style.display = 'grid'; handArea.style.display = 'flex';
    if (G.playerHand.length === 0) drawInitialHand();
    renderBattle();
  }
}

// 보스 인트로 렌더링 (추가됨)
function renderBossIntro() {
  const container = document.getElementById('intro-area');
  const s = STAGES[G.stageIdx];
  const dialogue = dialogues[G.stageIdx];
  const imgUrl = bossImages[G.stageIdx];

  container.innerHTML = `
    <div class="boss-image" style="background-image: url('${imgUrl}')"></div>
    <div class="boss-intro-text">"${dialogue}"</div>
    <button onclick="confirmStartBattle()">전투 시작 (VS ${s.name})</button>
  `;
}

function confirmStartBattle() {
  G.showIntro = false; renderMain();
}

function renderBattle() {
  const s = STAGES[G.stageIdx];
  
  // HP 영역 렌더링 (HP 바 비례 계산 적용)
  const hpArea = document.getElementById('hp-area');
  const pPct = (G.playerHp / G.playerMaxHp) * 100;
  const ePct = (G.enemyHp / G.enemyMaxHp) * 100;
  
  // 자바스크립트에서 HP당 너비 계산 (예: HP 1당 15px)
  const pTrackW = G.playerMaxHp * 15 + "px";
  const eTrackW = G.enemyMaxHp * 15 + "px";

  hpArea.innerHTML = `
    <div class="hp-row">
      <div class="name">플레이어</div>
      <div class="hp-track" style="--max-w: ${pTrackW};"><div class="hp-bar" style="width:${pPct}%"></div></div>
      <div class="hp-num">${G.playerHp}/${G.playerMaxHp}</div>
    </div>
    <div class="hp-row">
      <div class="name" style="color:var(--accent2);">${s.name}</div>
      <div class="hp-track" style="--max-w: ${eTrackW};"><div class="hp-bar" style="width:${ePct}%"></div></div>
      <div class="hp-num">${G.enemyHp}/${G.enemyMaxHp}</div>
    </div>
  `;

  // 나머지 중간 영역, 로그, 핸드 렌더링 유지
  const middleArea = document.getElementById('middle-area');
  middleArea.innerHTML = '<div class="tracker-panel"><div class="tracker-header">적 덱 (남은 카드)</div><div id="enemy-tracker" class="tracker-grid"></div></div><div id="battle-log" class="log-area"></div>';
  const tracker = document.getElementById('enemy-tracker');
  const allECards = [...G.enemyDeck, ...G.enemyDiscard].sort((a,b)=>a.type.localeCompare(b.type));
  allECards.forEach(card => { const el = document.createElement('div'); el.className = `tracker-card ${card.played ? 'played' : ''}`; el.innerHTML = `${types[card.type]}<span style="font-size:0.7em;">${tiers[card.tier].name}</span>`; tracker.appendChild(el); });
  const log = document.getElementById('battle-log');
  G.battleLog.slice(-20).forEach(entry => { const el = document.createElement('div'); el.className = `log-entry ${entry.type}`; el.textContent = entry.text; log.appendChild(el); });
  
  const handArea = document.getElementById('hand-area');
  handArea.innerHTML = `<div class="hand-header"><span>나의 핸드</span><span style="opacity:0.6; font-size:0.8rem;">덱: ${G.playerDeck.length}</span></div><div id="cards-container" class="cards-container"></div>`;
  const container = document.getElementById('cards-container');
  G.playerHand.forEach(card => {
    const btn = document.createElement('button'); btn.className = `card-btn ${tiers[card.tier].cls}`;
    btn.onclick = () => playCard(card.id);
    btn.innerHTML = `<div class="card-icon">${types[card.type]}</div><div class="card-dmg">${tiers[card.tier].name}/${tiers[card.tier].dmg}</div>`;
    container.appendChild(btn);
  });
}

function shuffle(a) { for(let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i], a[j]]=[a[j], a[i]]; } }
</script>
</body>
</html>
