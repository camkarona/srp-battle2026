          <div class="opt-desc">HP <b style="color:var(--text)">${G.playerHp}</b> → <b style="color:var(--win)">${newHp}</b><br><span style="font-size:.6rem">(+5 회복)</span></div>
        </div>
        <div class="option-card upgrade ${uSel?'selected':''}"
             onclick="restChoice='upgrade';restUpgradeIdx=null;renderRestStop()">
          <div class="opt-icon">⚡</div>
          <div class="opt-name" style="color:var(--silver)">카드 강화</div>
          <div class="opt-desc">내 덱 카드 1장을<br>한 단계 강화합니다<br><b style="color:var(--gold)">최대 골(7DMG)</b><br><span style="color:var(--shield);font-size:.6rem">🛡 실드도 함께 증가 (노멀0→실버2→골드4)</span></div>
        </div>
      </div>
      ${upSub}
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="confirmRestStop()" ${canConfirm?'':'disabled'}>
          선택 확정 → 다음 스테이지
        </button>
      </div>
    </div>`;
}
function confirmRestStop(){
  if(restChoice==='bakkus'){ G.playerHp += 5; SFX.heal(); }
  else if(restChoice==='upgrade'&&restUpgradeIdx!==null){
    const c=G.deck[restUpgradeIdx];
    G.deck[restUpgradeIdx]=makeCard(c.type,c.tier==='normal'?'silver':'gold');
    SFX.upgrade();
  }
  restChoice=null; restUpgradeIdx=null;
  // 🗺️ 노드 기반 진행
  proceedFromCurrentNode();
}

/* 현재 노드의 next 처리: 1개면 자동 진입, 여러개면 분기 화면 */
function proceedFromCurrentNode(){
  const cur = MAP_NODES[G.currentNodeId];
  if(!cur || !cur.next || cur.next.length === 0){
    // 다음 노드 없음 = 게임 클리어 (보스는 별도 처리)
    return;
  }
  if(cur.next.length === 1){
    enterNode(cur.next[0]);
  } else {
    G.pendingNextOptions = cur.next;
    G.screen = 'map_select';
    render();
  }
}

/* 다음 스테이지로 진입 (노드 기반) — 기존 호출부 호환 유지 */
function proceedToNextStage(){
  proceedFromCurrentNode();
}

/* 🌙 뒷거래 — 거래상 인트로 / 카드 선택 / 덱 교체 (대격변 v6.0) */
function renderDeal(){
  if(G.dealStep === 'intro')   return renderDealIntro();
  if(G.dealStep === 'pick')    return renderDealPick();
  if(G.dealStep === 'replace') return renderDealReplace();
  if(G.dealStep === 'reject')  return renderDealReject();
}

function renderDealIntro(){
  // 💡 수정: 거래 비용이 2가 되었으므로, HP가 2 이하일 때 위험 경고를 띄웁니다.
  const lowHp = G.playerHp <= 2;
  const warn = lowHp
    ? `<div style="color:var(--danger);font-size:.72rem;margin-top:8px;font-weight:700">※ HP가 위험합니다! (사망 주의)</div>`
    : '';
  // 💗 현재 HP 표시 (거래 응할지 결정에 도움)
  const hpDisplay = `
    <div style="display:flex;justify-content:center;align-items:center;gap:8px;margin:10px 0;padding:8px 14px;background:var(--bg2);border-radius:8px;border:1px solid var(--border);max-width:200px;margin-left:auto;margin-right:auto">
      <span style="font-size:.7rem;color:var(--text-dim)">나의 HP</span>
      <span style="font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:${G.playerHp <= 3 ? 'var(--danger)' : G.playerHp <= 6 ? 'var(--accent)' : 'var(--win)'}">
        ${G.playerHp} / ${G.playerMaxHp}
      </span>
    </div>`;
  $('app').innerHTML = `
    ${titleBarHTML('🚶 길 위에서')}
    <div class="panel deal-panel" style="text-align:center;padding:24px 20px">
      <div style="font-size:.7rem;color:var(--text-dim);letter-spacing:3px;margin-bottom:10px">
        터벅... 터벅...
      </div>
      <div class="dealer-img-frame" style="background-image:url('dealer.jpg')"></div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:var(--accent);margin:14px 0 6px">
        수상한 거래상
      </div>
      <div class="boss-dialogue" style="margin-bottom:6px">
        "쉿... 좋은 카드가 있는데, 한번 보겠소?<br>
        <span style="font-size:.78rem;color:var(--danger)">단, 보려면 HP -2 이오.</span>"
      </div>
      ${hpDisplay}
      ${warn}
      <div class="modal-actions" style="margin-top:14px;display:flex;gap:10px;flex-direction:column">
        <button class="btn btn-primary" onclick="acceptDeal()">거래에 응한다 (HP -2)</button>
        <button class="btn btn-draw" onclick="rejectDeal()">거절한다</button>
      </div>
    </div>`;
}

function acceptDeal(){
  // 💡 수정: 실제로 플레이어의 HP를 2만큼 차감합니다.
  G.playerHp = Math.max(0, G.playerHp - 2);
  SFX.hpLoss();
  // HP가 0이 되면 게임오버 처리
  if(G.playerHp <= 0){
    G.isGameOver = true;
    G.screen = 'gameover';
    render();
    return;
  }
  G.dealCards = generateDealCards(3);
  G.dealPickIdx = null;
  G.dealRevealed = [false, false, false];  // 🎴 모두 뒷면으로 초기화
  G.dealStep = 'pick';
  render();
}

function rejectDeal(){
  G.dealStep = 'reject';
  render();
}

function renderDealReject(){
  $('app').innerHTML = `
    ${titleBarHTML('🚶 길 위에서')}
    <div class="panel deal-panel" style="text-align:center;padding:30px 20px">
      <div class="dealer-img-frame" style="background-image:url('dealer.jpg');opacity:.5"></div>
      <div class="boss-dialogue" style="margin:18px 0">
        "아쉽군... 또 보세."
      </div>
      <button class="btn btn-primary" onclick="proceedToNextStage()" style="margin-top:8px">계속 가던 길을 간다 →</button>
    </div>`;
}

function renderDealPick(){
  // 🎭 카드 공개 상태: G.dealRevealed (배열, true/false) 
  if(!G.dealRevealed) G.dealRevealed = [false, false, false];
  // 🎭 마지막으로 공개된 카드 인덱스 — 그것만 애니메이션
  if(typeof G.dealJustRevealedIdx === 'undefined') G.dealJustRevealedIdx = -1;
  
  const pips = G.dealCards.map((c, i) => {
    const ct = CARD_TYPES[c.type];
    const shd = cardShield(c);
    const sel = G.dealPickIdx === i;
    const revealed = G.dealRevealed[i];
    const isVariant = c.tier === 'variant';
    
    if(!revealed){
      return `<div class="deal-card-option deal-card-back">
        <div class="dco-back-icon">🎴</div>
        <div class="dco-back-text">???</div>
      </div>`;
    }
    // 마지막에 공개된 카드만 flip 애니메이션
    const flipClass = (i === G.dealJustRevealedIdx) ? 'deal-card-just-revealed' : '';
    const variantClass = isVariant ? 'deal-card-variant' : '';
    const tierLabel = isVariant ? '변종' : TIER[c.tier].label;
    const tierColor = isVariant ? '#ff7eb8' : TIER[c.tier].color;
    const variantBadge = isVariant 
      ? `<div style="position:absolute;top:4px;right:4px;font-size:.55rem;background:linear-gradient(45deg,#ff5e5e,#ffae5e,#fff85e,#5eff7e,#5edcff,#bf5eff);color:#fff;padding:2px 5px;border-radius:4px;font-weight:700;letter-spacing:.5px">VARIANT</div>` 
      : '';
    return `<div class="deal-card-option deal-card-revealed ${flipClass} ${variantClass} ${sel?'selected':''}" onclick="onDealCardClick(${i})" style="position:relative">
      ${variantBadge}
      <div class="dco-icon">${ct.icon}</div>
      <div class="dco-name" style="color:${tierColor}">${tierLabel} ${ct.name}</div>
      <div class="dco-stats">DMG ${cardDmg(c)}${shd>0?` 🛡${shd}`:''}</div>
      ${isVariant ? `<div style="font-size:.55rem;color:var(--text-dim);margin-top:2px">⚠️ 강화 불가</div>` : ''}
    </div>`;
  }).join('');
  
  // 🎴 내 덱 표시 (항상 하단에 노출)
  const myDeckPips = G.deck.map(c => {
    const ct = CARD_TYPES[c.type];
    const shd = cardShield(c);
    const isVariant = c.tier === 'variant';
    return `<div class="pip ${c.type} tier-${c.tier} ${isVariant?'pip-variant':''}" style="cursor:default;position:relative">
      <div class="pip-icon">${ct.icon}</div>
      <div class="pip-label">${c.type.slice(0,3).toUpperCase()}</div>
      <div class="pip-dmg">${cardDmg(c)}</div>
      ${shd>0?`<div class="pip-shield">🛡${shd}</div>`:''}
    </div>`;
  }).join('');
  
  const allRevealed = G.dealRevealed.every(r => r);
  const canConfirm = allRevealed && G.dealPickIdx !== null;
  const remaining = G.dealRevealed.filter(r=>!r).length;
  
  // 변종 카드 안내 (어떤 변종이 있는지 클릭 시 자세히)
  const hasVariant = allRevealed && G.dealCards.some(c => c.tier === 'variant');
  const variantHint = hasVariant 
    ? `<div style="text-align:center;font-size:.7rem;color:#ff7eb8;margin-top:8px;line-height:1.5">🌈 변종 카드는 강화 불가지만 특수 능력치를 가집니다 (클릭하여 자세히 보기)</div>`
    : '';
  
  $('app').innerHTML = `
    ${titleBarHTML('🃏 카드 공개')}
    <div class="panel" style="padding:18px 14px">
      <div style="text-align:center;font-size:.78rem;color:var(--text-dim);margin-bottom:12px;line-height:1.6">
        ${allRevealed 
          ? `"셋 중 하나만 가져갈 수 있소.<br>잘 골라보시오..."` 
          : `"잘 보시오..."<br><span style="font-size:.7rem">공개 중... (${3-remaining}/3)</span>`}
      </div>
      <div class="deal-card-grid">${pips}</div>
      ${variantHint}
      
      <div class="modal-actions" style="margin-top:14px">
        <button class="btn btn-primary" onclick="confirmDealPick()" ${canConfirm?'':'disabled'} style="width:100%">
          ${!allRevealed ? '카드를 공개하는 중...' : (canConfirm?'이 카드로 결정 →':'카드를 선택하세요')}
        </button>
      </div>
      
      <div style="margin-top:18px;padding-top:14px;border-top:1px dashed var(--border)">
        <div style="text-align:center;font-size:.7rem;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px">
          나의 현재 덱 (${G.deck.length}장)
        </div>
        <div class="pip-row" style="justify-content:center;gap:5px">${myDeckPips}</div>
      </div>
    </div>`;
  
  // 🎭 드라마틱 자동 공개: 1초 간격으로 한 장씩
  if(!allRevealed){
    setTimeout(() => {
      const idx = G.dealRevealed.findIndex(r => !r);
      if(idx !== -1 && G.screen === 'deal' && G.dealStep === 'pick'){
        G.dealRevealed[idx] = true;
        G.dealJustRevealedIdx = idx;  // 새로 공개된 인덱스 기록
        SFX.draw && SFX.draw();
        render();
      }
    }, 1000);
  } else {
    // 모두 공개됐으면 애니메이션 인덱스 리셋
    G.dealJustRevealedIdx = -1;
  }
}

/* 카드 클릭: 변종이면 자세히 알림, 일반이면 선택 */
function onDealCardClick(i){
  const c = G.dealCards[i];
  if(c && c.tier === 'variant'){
    // 변종이면 정보 알림 (선택은 별도)
    showVariantInfo(i);
  } else {
    G.dealPickIdx = i;
    render();
  }
}

/* 변종 카드 상세 정보 팝업 */
function showVariantInfo(i){
  const c = G.dealCards[i];
  if(!c) return;
  const ct = CARD_TYPES[c.type];
  
  // 💡 수정 포인트: TIER 데이터를 읽지 않고, cardDmg(c)와 cardShield(c) 함수를 직접 호출하여 실제 수치를 가져옵니다.
  const actualDmg = cardDmg(c);
  const actualShield = cardShield(c);

  const desc = ({
    scissors: '예리하지만 방어 불가 — 한 방의 폭딜!',
    rock:     '바위처럼 단단한 방어 — 패배 시에도 안전',
    paper:    '균형형 — 공격과 방어의 조화'
  })[c.type] || '';
  
  let modal = document.getElementById('variant-info-modal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'variant-info-modal';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="enemy-detail-bg" onclick="closeVariantInfo(${i})"></div>
    <div class="enemy-detail-panel" style="border-color:#ff7eb8;max-width:320px">
      <div class="enemy-detail-head" style="background:rgba(255,126,184,.08)">
        <span style="font-family:'Black Han Sans',sans-serif;background:linear-gradient(45deg,#ff5e5e,#ffae5e,#fff85e,#5eff7e,#5edcff,#bf5eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px">🌈 VARIANT 카드</span>
        <button class="map-modal-close" onclick="closeVariantInfo(${i})">✕</button>
      </div>
      <div class="enemy-detail-body" style="text-align:center">
        <div style="font-size:3rem;margin:8px 0">${ct.icon}</div>
        <div style="font-family:'Black Han Sans',sans-serif;font-size:1.1rem;color:var(--text);margin-bottom:6px">변종 ${ct.name}</div>
        <div style="display:flex;justify-content:center;gap:14px;margin:10px 0;font-family:'Rajdhani',sans-serif">
          <div><div style="font-size:.65rem;color:var(--text-dim)">공격력</div><div style="font-size:1.4rem;font-weight:700;color:var(--accent)">${actualDmg}</div></div>
          <div><div style="font-size:.65rem;color:var(--text-dim)">실드</div><div style="font-size:1.4rem;font-weight:700;color:var(--silver)">${actualShield}</div></div>
        </div>
        <div style="font-size:.78rem;color:var(--text-dim);line-height:1.6;margin:12px 0">${desc}</div>
        <div style="font-size:.7rem;color:var(--danger);background:rgba(240,74,106,.08);padding:8px;border-radius:6px;line-height:1.5">
          ⚠️ 강화 불가 (실버/골드로 업그레이드 안 됨)
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="selectVariantCard(${i})">이 카드 선택</button>
      </div>
    </div>`;
  modal.style.display = 'flex';
}

function closeVariantInfo(){
  const m = document.getElementById('variant-info-modal');
  if(m) m.remove();
}

function selectVariantCard(i){
  G.dealPickIdx = i;
  closeVariantInfo();
  render();
}

function confirmDealPick(){
  if(G.dealPickIdx === null) return;
  G.dealReplaceIdx = null;
  G.dealStep = 'replace';
  render();
}

function renderDealReplace(){
  const picked = G.dealCards[G.dealPickIdx];
  const pickedCt = CARD_TYPES[picked.type];
  const pickedShd = cardShield(picked);

  const deckPips = G.deck.map((c, i) => {
    const ct = CARD_TYPES[c.type];
    const shd = cardShield(c);
    const sel = G.dealReplaceIdx === i;
    return `<div class="deal-deck-card ${sel?'selected':''} pip ${c.type} tier-${c.tier}" onclick="G.dealReplaceIdx=${i}; render();">
      <div class="pip-icon">${ct.icon}</div>
      <div class="pip-label">${c.type.slice(0,3).toUpperCase()}</div>
      <div class="pip-dmg">${cardDmg(c)}</div>
      ${shd>0?`<div class="pip-shield">🛡${shd}</div>`:''}
    </div>`;
  }).join('');

  const canConfirm = G.dealReplaceIdx !== null;
  $('app').innerHTML = `
    ${titleBarHTML('🔄 덱 교체')}
    <div class="panel" style="padding:20px 16px">
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-size:.7rem;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px">새 카드</div>
        <div class="deal-card-option selected" style="display:inline-block;cursor:default">
          <div class="dco-icon">${pickedCt.icon}</div>
          <div class="dco-name" style="color:${TIER[picked.tier].color}">${TIER[picked.tier].label} ${pickedCt.name}</div>
          <div class="dco-stats">DMG ${cardDmg(picked)}${pickedShd>0?` 🛡${pickedShd}`:''}</div>
        </div>
      </div>
      <div style="text-align:center;font-size:.78rem;color:var(--text-dim);margin:14px 0 10px;line-height:1.6">
        ↓ 어떤 카드와 바꾸시겠소? ↓
      </div>
      <div class="pip-row" style="justify-content:center">${deckPips}</div>
      <div class="modal-actions" style="margin-top:18px">
        <button class="btn btn-primary" onclick="confirmDealReplace()" ${canConfirm?'':'disabled'} style="width:100%">
          ${canConfirm?'교체 확정 → 다음 스테이지':'교체할 카드를 선택하세요'}
        </button>
      </div>
    </div>`;
}

function confirmDealReplace(){
  if(G.dealReplaceIdx === null) return;
  G.deck[G.dealReplaceIdx] = G.dealCards[G.dealPickIdx];
  SFX.upgrade();
  G.dealCards = [];
  G.dealPickIdx = null;
  G.dealReplaceIdx = null;
  G.dealRevealed = [false, false, false];
  G.dealStep = 'intro';
  proceedFromCurrentNode();
}

/* ⑤ GAME OVER */
/* ⑤ GAME OVER */
function renderGameOver(){
  BGM.playGameOver();
  $('app').innerHTML=`
    ${titleBarHTML()}
    <div class="panel" style="text-align:center;padding:36px 20px">
      <div style="font-size:3rem;margin-bottom:12px">💀</div>
      <div style="font-family:'Black Han Sans',sans-serif;color:var(--danger);font-size:1.4rem;margin-bottom:8px">GAME OVER</div>
      <div style="font-size:.8rem;color:var(--text-dim);line-height:1.8;margin-bottom:20px">
        ${STAGES[G.stageIdx].enemyIcon} ${STAGES[G.stageIdx].enemyName}에게 쓰러졌습니다.<br>전략을 다듬고 다시 도전하세요!
      </div>
     <button class="btn btn-primary" onclick="location.reload()">🏠 처음 화면으로</button>
    </div>`;
}

        <button class="btn btn-draw" style="margin-top:30px; opacity:0; transition:opacity 2s;" id="btn-return" onclick="location.reload()">메인으로 돌아가기</button>
      </div>

    </div>
  `;

  // 💡 페이드 인/아웃 타이밍 시퀀스
  setTimeout(() => { document.getElementById('end-scene-1').classList.add('show'); }, 1000); // 1초 후 1장 등장
  setTimeout(() => { document.getElementById('end-scene-1').classList.remove('show'); }, 6000); // 6초 후 1장 퇴장
  
  setTimeout(() => { document.getElementById('end-scene-2').classList.add('show'); }, 8000); // 8초 후 2장 등장
  setTimeout(() => { document.getElementById('end-scene-2').classList.remove('show'); }, 13000); // 13초 후 2장 퇴장
  
  setTimeout(() => { 
    document.getElementById('end-scene-3').classList.add('show'); // 15초 후 크레딧 등장
    setTimeout(() => { document.getElementById('btn-return').style.opacity = '1'; }, 3000); // 크레딧 후 버튼 등장
  }, 15000);
}

// 💡 게임 시작 시 글리치 트랜지션 연출 적용
// 💡 게임 시작 시 글리치 트랜지션 연출 적용
function startGame(){
  const appContainer = $('app');
  appContainer.classList.add('glitch-transition'); // 화면 깨짐 애니메이션 켜기
  
  // 글리치가 중간쯤 진행됐을 때(0.2초 후) 화면 데이터 변경
  setTimeout(() => {
    // BGM.play() 삭제: 지도 화면에서는 브금을 틀지 않는 게 맞습니다.
    G.isGameOver = false;
    G.character = null;
    charPickKey = null;
    rewardPickIdx = null; 
    restChoice = null; 
    restUpgradeIdx = null;
    G.log = [];
    G.currentNodeId = null;
    G.visitedNodes = [];
    G.seenEnemies = loadSeenEnemies();
    G.enemyDetailNodeId = null;
    G.mapModalOpen = false;
    G.screen = 'map';   
    render();
    
    // 애니메이션이 끝나면 클래스 제거하여 초기화
    setTimeout(() => appContainer.classList.remove('glitch-transition'), 200);
  }, 200);
}



/* 🗂️ sessionStorage 헬퍼 — 만난 적 정보 (브라우저 세션 한정 유지) */
function saveSeenEnemies(){
  try { sessionStorage.setItem('srp_seenEnemies', JSON.stringify(G.seenEnemies)); }
  catch(e){ /* sessionStorage 차단 환경 무시 */ }
}
function loadSeenEnemies(){
  try {
    const raw = sessionStorage.getItem('srp_seenEnemies');
    return raw ? JSON.parse(raw) : [];
  } catch(e){ return []; }
}

window.onload=()=>render();
</script>

<script>
window.DEBUG = {
  goto(nodeId){
    if(!MAP_NODES[nodeId]){ console.error('알 수 없는 노드:', nodeId); return; }
    if(!G.character){ G.character = 'karona'; G.deck = buildStarterDeck(); }
    G.isGameOver = false;
    enterNode(nodeId);
  },
  skipTo(nodeId, charKey = 'karona'){
    G.character = charKey;
    G.deck = buildStarterDeck();
    G.isGameOver = false;
    G.visitedNodes = [];
    G.seenEnemies = [];
    G.currentNodeId = null;
    enterNode(nodeId);
  },
  setHp(n){ G.playerHp = n; G.playerMaxHp = Math.max(G.playerMaxHp, n); if(G.screen!=='title') render(); },
  setEnemyHp(n){ G.enemyHp = n; if(G.screen!=='title') render(); },
  god(){ this.setHp(999); },
  killEnemy(){
    if(G.screen === 'battle' && G.enemyHp > 0) {
      G.enemyHp = 0;
      render();
      setTimeout(triggerStageClear, 500);
    } else {
      alert('전투 중에만 사용할 수 있습니다.');
    }
  },
  // 6장 제한을 지키기 위해 첫 번째 카드를 덮어쓰는 방식으로 수정!
  addCard(type, tier = 'normal'){
    if(!G.deck || G.deck.length === 0) G.deck = buildStarterDeck();
    
    // 💡 덱의 0번 인덱스(첫 번째 카드)를 해당 카드로 교환
    const oldCard = G.deck[0];
    G.deck[0] = makeCard(type, tier);
    
    if(G.screen !== 'title') render(); 
    alert(`[DEBUG] 첫 번째 패였던 ${oldCard.type}(${oldCard.tier}) 카드가 ${type}(${tier}) 카드로 교체되었습니다.`);
  }
};
